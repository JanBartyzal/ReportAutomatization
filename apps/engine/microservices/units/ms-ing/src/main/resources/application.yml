server:
  port: 8080
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB
      file-size-threshold: 256KB
      resolve-lazily: true

spring:
  application:
    name: ms-ing
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_ing}
    username: ${DB_USERNAME:ms_ing}
    password: ${DB_PASSWORD:ms_ing}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Azure Blob Storage
azure:
  storage:
    blob:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1}
      container-name: ${AZURE_STORAGE_CONTAINER:file-uploads}

# File upload limits per MIME type (in bytes)
upload:
  max-size:
    pptx: 52428800   # 50 MB
    xlsx: 52428800   # 50 MB
    csv:  52428800   # 50 MB
    pdf:  104857600  # 100 MB

# Dapr
dapr:
  pubsub:
    name: ${DAPR_PUBSUB_NAME:pubsub}
    topic: file-uploaded
  app-id: ms-ing
  scan-service:
    app-id: ${DAPR_SCAN_APP_ID:ms-scan}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ms-ing
