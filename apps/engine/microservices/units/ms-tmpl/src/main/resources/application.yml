server:
  port: 8080

spring:
  application:
    name: ms-tmpl
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reportplatform}
    username: ${DB_USERNAME:ms_tmpl}
    password: ${DB_PASSWORD:ms_tmpl_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Dapr configuration
dapr:
  app-id: ms-tmpl
  pubsub:
    name: ${DAPR_PUBSUB_NAME:pubsub}
  method:
    invocation:
      enabled: true

# AI mapping configuration
mapping:
  ai:
    enabled: ${MAPPING_AI_ENABLED:true}
    min-confidence: 0.8
    dapr-app-id: ${MAPPING_AI_DAPR_APP_ID:ms-atm-ai}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ms-tmpl
