server:
  port: 8080
  tomcat:
    threads:
      max: 200
    accept-count: 100

spring:
  application:
    name: ms-auth
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Azure Entra ID (AAD) Configuration
azure:
  entra:
    tenant-id: ${AZURE_TENANT_ID:}
    client-id: ${AZURE_CLIENT_ID:}
    jwks-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/discovery/v2.0/keys
    issuer: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/v2.0
  keyvault:
    uri: ${AZURE_KEYVAULT_URI:}
    enabled: ${AZURE_KEYVAULT_ENABLED:false}

# Auth service settings
auth:
  jwks:
    cache-ttl-minutes: 5
  api-key:
    header-name: X-API-Key

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

logging:
  level:
    com.reportplatform.auth: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
