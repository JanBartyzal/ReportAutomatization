server:
  port: 8080

spring:
  application:
    name: ms-dash
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reportplatform}
    username: ${DB_USERNAME:ms_dash}
    password: ${DB_PASSWORD:ms_dash_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

dapr:
  pubsub:
    name: ${DAPR_PUBSUB_NAME:reportplatform-pubsub}
  app-id: ms-dash

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ms-dash
