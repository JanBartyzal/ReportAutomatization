server:
  port: 8080

spring:
  application:
    name: ms-ext-snow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:snow_db}
    username: ${DB_USERNAME:snow_user}
    password: ${DB_PASSWORD:snow_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:5000}

# Dapr configuration
dapr:
  host: ${DAPR_HOST:localhost}
  http-port: ${DAPR_HTTP_PORT:3500}
  grpc-port: ${DAPR_GRPC_PORT:50001}
  pubsub-name: ${DAPR_PUBSUB_NAME:pubsub}

# Azure Key Vault
azure:
  keyvault:
    uri: ${AZURE_KEYVAULT_URI:}

# JWT validation
jwt:
  issuer: ${JWT_ISSUER:https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/v2.0}
  audience: ${JWT_AUDIENCE:}
  jwks-uri: ${JWT_JWKS_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}

# Service-Now configuration
servicenow:
  connect-timeout-ms: ${SNOW_CONNECT_TIMEOUT:10000}
  response-timeout-ms: ${SNOW_RESPONSE_TIMEOUT:30000}
  max-page-size: ${SNOW_MAX_PAGE_SIZE:1000}
  retry-max-attempts: ${SNOW_RETRY_MAX_ATTEMPTS:3}
  retry-backoff-ms: ${SNOW_RETRY_BACKOFF_MS:1000}

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.reportplatform: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
