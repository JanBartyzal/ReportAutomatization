server:
  port: 8080

spring:
  application:
    name: ms-sink-doc
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_sink_doc}
    username: ${DB_USERNAME:ms_sink_doc}
    password: ${DB_PASSWORD:ms_sink_doc}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Dapr configuration
dapr:
  app-id: ms-sink-doc
  pubsub:
    name: ${DAPR_PUBSUB_NAME:pubsub}
  method:
    invocation:
      enabled: true

# Topic for embedding generation
dapr:
  pubsub:
    embedding-topic: document-embedding

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
