spring:
  application:
    name: ms-tmpl-pptx
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reportplatform}
    username: ${DB_USERNAME:tmpl_pptx_user}
    password: ${DB_PASSWORD:tmpl_pptx_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 256KB

azure:
  storage:
    blob:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      container-name: ${AZURE_STORAGE_CONTAINER:templates}

dapr:
  sidecar:
    host: ${DAPR_HOST:localhost}
    http-port: ${DAPR_HTTP_PORT:3500}
    grpc-port: ${DAPR_GRPC_PORT:50001}
  pubsub:
    name: ${DAPR_PUBSUB_NAME:reportplatform-pubsub}
  app-id: ms-tmpl-pptx

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ms-tmpl-pptx

server:
  port: ${HTTP_PORT:8080}

logging:
  level:
    com.reportplatform.tmplpptx: ${LOG_LEVEL:INFO}
    io.dapr: INFO

# Feature flags configuration (P6-W3-002)
feature-flags:
  enable-local-scope: ${ENABLE_LOCAL_SCOPE:false}
  enable-advanced-comparison: ${ENABLE_ADVANCED_COMPARISON:false}
