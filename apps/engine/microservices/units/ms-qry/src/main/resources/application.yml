server:
  port: 8080

spring:
  application:
    name: ms-qry
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reportplatform}
    username: ${DB_USERNAME:ms_qry}
    password: ${DB_PASSWORD:ms_qry_pass}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      timeout: 2000

# Cache config
cache:
  ttl-minutes: 5

# Dapr
dapr:
  pubsub:
    name: ${DAPR_PUBSUB_NAME:reportplatform-pubsub}
  app-id: ms-qry

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ms-qry
