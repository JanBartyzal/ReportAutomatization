# Nginx API Gateway Configuration for ReportAutomatization P1
# Routes external requests to appropriate microservices

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # RATE LIMITING ZONES
    # =============================================================================

    # API rate limit: 100 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Auth rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=10r/s;

    # Upload rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=upload_limit:1m rate=10r/s;

    # =============================================================================
    # UPSTREAM BACKENDS
    # =============================================================================

    upstream ms_auth {
        server ms-auth:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_admin {
        server ms-admin:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_batch {
        server ms-batch:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_ing {
        server ms-ing:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_orch {
        server ms-orch:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_qry {
        server ms-qry:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_dash {
        server ms-dash:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =============================================================================
    # SERVER CONFIGURATION
    # =============================================================================

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Readiness check
        location /ready {
            access_log off;
            return 200 "READY\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # AUTH SERVICE ROUTES
        # =============================================================================

        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://ms_auth/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers (for preflight)
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # UPLOAD SERVICE ROUTES
        # =============================================================================

        location /api/upload/ {
            limit_req zone=upload_limit burst=10 nodelay;

            proxy_pass http://ms_ing/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Increased timeouts for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Maximum upload size: 100MB
            client_max_body_size 100M;
            proxy_request_buffering off;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # ORCHESTRATOR SERVICE ROUTES
        # =============================================================================

        location /api/orch/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_orch/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # QUERY API ROUTES (MS-QRY)
        # =============================================================================

        location /api/query/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_qry/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # DASHBOARD API ROUTES (MS-DASH)
        # =============================================================================

        location /api/dashboards/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_dash/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # ADMIN API ROUTES (P3a)
        # =============================================================================

        location /api/admin/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_admin/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # BATCH API ROUTES (P3a)
        # =============================================================================

        location /api/batches/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_batch/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # DEFAULT API ROUTES (fallback)
        # =============================================================================

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            # Forward to orchestrator by default for workflow operations
            proxy_pass http://ms_orch/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # STATIC FILES (if needed)
        # =============================================================================

        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # =============================================================================
        # DEFAULT LOCATION
        # =============================================================================

        location / {
            return 404 '{"error": "Not Found", "message": "The requested resource was not found"}';
            add_header Content-Type application/json;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
