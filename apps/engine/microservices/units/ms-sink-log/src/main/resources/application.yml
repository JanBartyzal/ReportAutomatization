server:
  port: 8080

spring:
  application:
    name: ms-sink-log
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_sink_log}
    username: ${DB_USERNAME:ms_sink_log}
    password: ${DB_PASSWORD:ms_sink_log}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

dapr:
  app-id: ms-sink-log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
