<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Notification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #0078d4;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .notification-type {
            display: inline-block;
            background-color: #e1dfdd;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Report Platform</h1>
    </div>
    <div class="content">
        <span class="notification-type" th:text="${type}">NOTIFICATION</span>
        <h2 th:text="${title}">Title</h2>
        <p th:text="${body}">Body</p>
        <div th:if="${data != null}">
            <p><strong>Additional Details:</strong></p>
            <ul>
                <li th:each="entry : ${data}" th:text="${entry.key} + ': ' + ${entry.value}">Detail</li>
            </ul>
        </div>
    </div>
    <div class="footer">
        <p>This is an automated notification from Report Platform.</p>
        <p>To manage your notification preferences, please visit your profile settings.</p>
    </div>
</body>

</html>
