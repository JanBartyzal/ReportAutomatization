<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Approaching</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #ff8c00;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .warning-badge {
            display: inline-block;
            background-color: #ff8c00;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .deadline-info {
            background-color: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #ff8c00;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Deadline Approaching</h1>
    </div>
    <div class="content">
        <span class="warning-badge">REMINDER</span>
        <h2 th:text="${title}">Deadline Reminder</h2>
        <div class="deadline-info">
            <p><strong>Your reporting deadline is approaching!</strong></p>
            <p th:text="${body}">Body</p>
        </div>
        <div th:if="${data != null}">
            <p><strong>Deadline Details:</strong></p>
            <ul>
                <li th:if="${data.get('period')}" th:text="'Period: ' + ${data.get('period')}"></li>
                <li th:if="${data.get('deadline')}" th:text="'Deadline: ' + ${data.get('deadline')}"></li>
                <li th:if="${data.get('remainingDays')}" th:text="'Remaining: ' + ${data.get('remainingDays')}"></li>
            </ul>
        </div>
        <p>Please submit your report before the deadline to avoid any issues.</p>
    </div>
    <div class="footer">
        <p>Report Platform - Financial Reporting System</p>
    </div>
</body>

</html>
