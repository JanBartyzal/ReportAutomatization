server:
  port: 8080

spring:
  application:
    name: ms-notif
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notif_db}
    username: ${DB_USERNAME:notif_user}
    password: ${DB_PASSWORD:notif_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # Email configuration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
    default-encoding: UTF-8

# Dapr configuration
app:
  dapr:
    pubsub-name: reportplatform-pubsub
    statestore-name: reportplatform-statestore
    period-service: ms-period
    lifecycle-service: ms-lifecycle
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@reportplatform.local}

# WebSocket configuration
spring.websocket:
  allowed-origins: "*"

# Thymeleaf configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

# Logging
logging:
  level:
    com.reportplatform: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
