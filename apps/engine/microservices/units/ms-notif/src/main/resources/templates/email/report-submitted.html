<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #0078d4;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .info-badge {
            display: inline-block;
            background-color: #0078d4;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .report-info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #0078d4;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Report Submitted</h1>
    </div>
    <div class="content">
        <span class="info-badge">NEW SUBMISSION</span>
        <h2 th:text="${title}">Report Ready for Review</h2>
        <div class="report-info">
            <p>A new report has been submitted for your review.</p>
            <p th:text="${body}">Body</p>
        </div>
        <div th:if="${data != null}">
            <p><strong>Report Details:</strong></p>
            <ul>
                <li th:if="${data.get('company')}" th:text="'Company: ' + ${data.get('company')}"></li>
                <li th:if="${data.get('period')}" th:text="'Period: ' + ${data.get('period')}"></li>
                <li th:if="${data.get('submittedBy')}" th:text="'Submitted by: ' + ${data.get('submittedBy')}"></li>
            </ul>
        </div>
        <p>Log in to review and approve or reject the report.</p>
    </div>
    <div class="footer">
        <p>Report Platform - Financial Reporting System</p>
    </div>
</body>

</html>
