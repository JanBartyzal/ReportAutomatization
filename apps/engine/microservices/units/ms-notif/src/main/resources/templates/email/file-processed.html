<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Processing Complete</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #107c10;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .success-badge {
            display: inline-block;
            background-color: #107c10;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .file-info {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #107c10;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>File Processing Complete</h1>
    </div>
    <div class="content">
        <span class="success-badge">SUCCESS</span>
        <h2 th:text="${title}">File Processed Successfully</h2>
        <div class="file-info">
            <p><strong>Your file has been processed successfully.</strong></p>
            <p th:text="${body}">Body</p>
        </div>
        <div th:if="${data != null}">
            <p><strong>Details:</strong></p>
            <ul>
                <li th:if="${data.get('filename')}" th:text="'File: ' + ${data.get('filename')}"></li>
                <li th:if="${data.get('period')}" th:text="'Period: ' + ${data.get('period')}"></li>
                <li th:if="${data.get('recordCount')}" th:text="'Records: ' + ${data.get('recordCount')}"></li>
            </ul>
        </div>
    </div>
    <div class="footer">
        <p>Log in to Report Platform to view your processed data.</p>
    </div>
</body>

</html>
