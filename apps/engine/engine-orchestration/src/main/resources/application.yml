spring:
  application:
    name: ms-orch
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orch_db}
    username: ${DB_USERNAME:orch_user}
    password: ${DB_PASSWORD:orch_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

grpc:
  server:
    port: ${GRPC_PORT:50051}
    enable-keep-alive: true
    keep-alive-time: 30s
    keep-alive-timeout: 10s
    permit-keep-alive-without-calls: true

dapr:
  app-id: ${DAPR_APP_ID:ms-orch}
  sidecar:
    host: ${DAPR_HOST:localhost}
    http-port: ${DAPR_HTTP_PORT:3500}
    grpc-port: ${DAPR_GRPC_PORT:50001}
  pubsub:
    name: ${DAPR_PUBSUB_NAME:reportplatform-pubsub}
  statestore:
    name: ${DAPR_STATESTORE_NAME:reportplatform-statestore}

routing:
  engine-core: engine-core
  engine-data: engine-data
  engine-reporting: engine-reporting
  processor-atomizers: processor-atomizers
  processor-generators: processor-generators
  engine-integrations: engine-integrations
  engine-ingestor: engine-ingestor

workflow:
  saga:
    max-retry-count: 3
    # Exponential backoff delays: 1s, 5s, 30s
    retry-delays-ms: 1000,5000,30000
    compensate-timeout-ms: 30000
  idempotency:
    ttl-hours: 24
  orchestrator:
    # Step execution timeout
    step-timeout-ms: 60000
    # Workflow execution timeout
    workflow-timeout-ms: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ms-orch

server:
  port: ${HTTP_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    com.reportplatform.orch: ${LOG_LEVEL:INFO}
    org.springframework.statemachine: WARN
    io.dapr: INFO
    io.opentelemetry.exporter: ${OTEL_LOG_LEVEL:OFF}
    io.opentelemetry.sdk: ${OTEL_LOG_LEVEL:WARN}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
