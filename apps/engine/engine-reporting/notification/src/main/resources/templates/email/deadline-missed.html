<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Missed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #d13438;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .critical-badge {
            display: inline-block;
            background-color: #d13438;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .missed-info {
            background-color: #fff0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #d13438;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Deadline Missed</h1>
    </div>
    <div class="content">
        <span class="critical-badge">CRITICAL - ACTION REQUIRED</span>
        <h2 th:text="${title}">Deadline Has Been Missed</h2>
        <div class="missed-info">
            <p><strong>The reporting deadline has passed.</strong></p>
            <p th:text="${body}">Body</p>
        </div>
        <div th:if="${data != null}">
            <p><strong>Details:</strong></p>
            <ul>
                <li th:if="${data.get('period')}" th:text="'Period: ' + ${data.get('period')}"></li>
                <li th:if="${data.get('deadline')}" th:text="'Deadline: ' + ${data.get('deadline')}"></li>
                <li th:if="${data.get('company')}" th:text="'Company: ' + ${data.get('company')}"></li>
            </ul>
        </div>
        <p>Please contact the holding administrator immediately to resolve this issue.</p>
    </div>
    <div class="footer">
        <p>Report Platform - Financial Reporting System</p>
    </div>
</body>

</html>
