<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Processing Failed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #d13438;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }

        .error-badge {
            display: inline-block;
            background-color: #d13438;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .error-info {
            background-color: #fff0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #d13438;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>File Processing Failed</h1>
    </div>
    <div class="content">
        <span class="error-badge">CRITICAL - ACTION REQUIRED</span>
        <h2 th:text="${title}">File Processing Failed</h2>
        <div class="error-info">
            <p><strong>There was an error processing your file.</strong></p>
            <p th:text="${body}">Body</p>
        </div>
        <div th:if="${data != null}">
            <p><strong>Error Details:</strong></p>
            <ul>
                <li th:if="${data.get('filename')}" th:text="'File: ' + ${data.get('filename')}"></li>
                <li th:if="${data.get('error')}" th:text="'Error: ' + ${data.get('error')}"></li>
                <li th:if="${data.get('period')}" th:text="'Period: ' + ${data.get('period')}"></li>
            </ul>
        </div>
        <p>Please log in to the platform to review and retry the file processing.</p>
    </div>
    <div class="footer">
        <p>If you continue to experience issues, please contact support.</p>
    </div>
</body>

</html>
