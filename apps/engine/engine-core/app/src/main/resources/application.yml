server:
  port: ${HTTP_PORT:8081}
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 200
    accept-count: 100

spring:
  application:
    name: engine-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:engine_core_db}
    username: ${DB_USERNAME:engine_core_user}
    password: ${DB_PASSWORD:engine_core_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: engine-core-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# Dapr configuration
dapr:
  app-id: ${DAPR_APP_ID:engine-core}
  sidecar:
    host: ${DAPR_HOST:localhost}
    http-port: ${DAPR_HTTP_PORT:3500}
    grpc-port: ${DAPR_GRPC_PORT:50001}
  pubsub:
    name: ${DAPR_PUBSUB_NAME:reportplatform-pubsub}
  statestore:
    name: ${DAPR_STATESTORE_NAME:reportplatform-statestore}
  remote:
    ms-tmpl-app-id: ${DAPR_MS_TMPL_APP_ID:ms-tmpl}
    ms-sink-tbl-app-id: ${DAPR_MS_SINK_TBL_APP_ID:ms-sink-tbl}

# Azure Entra ID (AAD) Configuration
azure:
  entra:
    tenant-id: ${AZURE_TENANT_ID:}
    client-id: ${AZURE_CLIENT_ID:}
    jwks-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/discovery/v2.0/keys
    issuer: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/v2.0
  keyvault:
    uri: ${AZURE_KEYVAULT_URI:}
    enabled: ${AZURE_KEYVAULT_ENABLED:false}

# Auth service settings
auth:
  mode: ${AUTH_MODE:production}
  jwks:
    cache-ttl-minutes: 5
  api-key:
    header-name: X-API-Key

# Actuator / Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: engine-core

# Health dashboard (service URLs are stored in DB table health_service_registry)
health:
  grafana-url: ${GRAFANA_URL:http://localhost:3000/grafana}

# Logging
logging:
  level:
    com.reportplatform: ${LOG_LEVEL:INFO}
    com.reportplatform.auth: ${LOG_LEVEL_AUTH:INFO}
    com.reportplatform.admin: ${LOG_LEVEL_ADMIN:INFO}
    com.reportplatform.batch: ${LOG_LEVEL_BATCH:INFO}
    com.reportplatform.ver: ${LOG_LEVEL_VER:INFO}
    com.reportplatform.audit: ${LOG_LEVEL_AUDIT:INFO}
    org.springframework.security: WARN
    io.dapr: INFO
    io.opentelemetry.exporter: ${OTEL_LOG_LEVEL:OFF}
    io.opentelemetry.sdk: ${OTEL_LOG_LEVEL:WARN}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
