# Nginx API Gateway Configuration for ReportAutomatization
# Routes external requests to consolidated service units

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # CORS ORIGIN WHITELIST
    # =============================================================================

    map $http_origin $cors_origin {
        default "";
        "~^https://.*\.company\.cz$" $http_origin;
        "http://localhost:3000"       $http_origin;
        "http://localhost:5173"       $http_origin;
    }

    # =============================================================================
    # RATE LIMITING ZONES
    # =============================================================================

    # API rate limit: 100 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Auth rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=10r/s;

    # Upload rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=upload_limit:1m rate=10r/s;

    # =============================================================================
    # CONSOLIDATED UPSTREAM BACKENDS
    # =============================================================================

    upstream engine_core {
        server engine-core:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_ingestor {
        server engine-ingestor:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_orchestrator {
        server engine-orchestrator:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_data {
        server engine-data:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_reporting {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_integrations {
        server engine-integrations:8106 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream processor_generators {
        server processor-generators:8111 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =============================================================================
    # SERVER CONFIGURATION
    # =============================================================================

    server {
        listen 80;
        server_name localhost;

        # =============================================================================
        # SECURITY HEADERS (applied to all responses)
        # =============================================================================

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

        # =============================================================================
        # INTERNAL AUTH SUBREQUEST
        # =============================================================================

        location = /internal/auth/verify {
            internal;
            proxy_pass http://engine_core/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Authorization $http_authorization;
        }

        # Ensure trailing slash for API resource paths (prevents nginx 301 redirects
        # that convert POST→GET and lose request bodies)
        rewrite ^(/api/(?:upload|files|notifications|auth|admin|batches|versions|audit|reports|periods|forms|templates|search|dashboards|integrations|query))$ $1/ last;

        # Health check endpoint (no auth)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Readiness check (no auth)
        location /ready {
            access_log off;
            return 200 "READY\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # AUTH SERVICE ROUTES -> engine-core (no auth_request - public auth endpoints)
        # =============================================================================

        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://engine_core;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # UPLOAD SERVICE ROUTES -> engine-ingestor
        # =============================================================================

        location /api/upload/ {
            limit_req zone=upload_limit burst=20 nodelay;

            auth_request /internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://engine_ingestor;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;

            # Increased timeouts for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Maximum upload size: 100MB
            client_max_body_size 100M;
            proxy_request_buffering off;

            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # FILES SERVICE ROUTES -> engine-ingestor
