        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request /internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://engine_reporting;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # INTEGRATIONS API ROUTES -> engine-integrations
        # =============================================================================

        location /api/export-flows/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request /internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://engine_integrations;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /api/integrations/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request /internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://engine_integrations;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # DEFAULT API ROUTES (fallback) -> 404
        # =============================================================================

        location /api/ {
            return 404 '{"error": "Not Found", "message": "Unknown API route"}';
            add_header Content-Type application/json always;
        }

        # =============================================================================
        # OPENAPI / SWAGGER UI DOCS
        # =============================================================================

        # Static docs landing page
        location = /docs {
            alias /usr/share/nginx/html/docs.html;
            add_header Content-Type text/html;
        }

        location = /docs/ {
            alias /usr/share/nginx/html/docs.html;
            add_header Content-Type text/html;
        }

        # Per-service Swagger UI & OpenAPI specs
        location /docs/core/ {
            proxy_pass http://engine_core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/core;
            proxy_set_header Connection "";
        }

        location /docs/ingestor/ {
            proxy_pass http://engine_ingestor/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/ingestor;
            proxy_set_header Connection "";
        }

        location /docs/data/ {
            proxy_pass http://engine_data/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/data;
            proxy_set_header Connection "";
        }

        location /docs/reporting/ {
            proxy_pass http://engine_reporting/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/reporting;
            proxy_set_header Connection "";
        }

        location /docs/orchestrator/ {
            proxy_pass http://engine_orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/orchestrator;
            proxy_set_header Connection "";
        }

        location /docs/integrations/ {
            proxy_pass http://engine_integrations/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/integrations;
            proxy_set_header Connection "";
        }

        location /docs/generators/ {
            proxy_pass http://processor_generators/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs/generators;
            proxy_set_header Connection "";
        }

        # =============================================================================
        # STATIC FILES (if needed)
        # =============================================================================

        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # =============================================================================
        # DEFAULT LOCATION
        # =============================================================================

        location / {
            return 404 '{"error": "Not Found", "message": "The requested resource was not found"}';
            add_header Content-Type application/json;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
