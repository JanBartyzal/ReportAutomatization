openapi: 3.0.3
info:
  title: File Ingestor API (MS-ING)
  description: File upload and management
  version: 1.0.0

servers:
  - url: /api/v1
    description: Base API server

security:
  - bearerAuth: []

paths:
  /api/upload:
    post:
      operationId: uploadFile
      summary: Upload file for processing
      description: >
        Upload a file for parsing or form import. Supports .pptx, .xlsx, .pdf,
        and .csv formats. Maximum file size is 50 MB for Office documents and
        100 MB for PDF files. Files are scanned for malware before acceptance.
      tags:
        - Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - upload_purpose
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                upload_purpose:
                  type: string
                  enum:
                    - PARSE
                    - FORM_IMPORT
                  description: Purpose of the upload
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large (max 50 MB for Office documents, 100 MB for PDF)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: PAYLOAD_TOO_LARGE
                message: "File exceeds maximum allowed size (50 MB for Office, 100 MB for PDF)"
        "415":
          description: Unsupported media type (allowed: .pptx, .xlsx, .pdf, .csv)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: UNSUPPORTED_MEDIA_TYPE
                message: "Unsupported file type. Allowed formats: .pptx, .xlsx, .pdf, .csv"
        "422":
          description: Infected file detected by malware scanner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: INFECTED_FILE
                message: File failed malware scan and has been rejected

  /api/files:
    get:
      operationId: listFiles
      summary: List uploaded files
      description: >
        Returns a paginated list of files uploaded by the current user's
        organization. Supports optional filtering by processing status.
      tags:
        - Files
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - UPLOADED
              - PROCESSING
              - COMPLETED
              - FAILED
              - PARTIAL
          description: Filter by file processing status
      responses:
        "200":
          description: Paginated list of files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFileList"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/files/{file_id}:
    get:
      operationId: getFileDetails
      summary: Get file details
      description: >
        Returns detailed information about a specific uploaded file, including
        its current workflow status.
      tags:
        - Files
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique file identifier
      responses:
        "200":
          description: File details with workflow status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDetailsWithWorkflow"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NOT_FOUND
                message: File not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Azure Entra ID v2.0 JWT token

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    FileUploadResponse:
      type: object
      required:
        - file_id
        - filename
        - size_bytes
        - mime_type
        - status
        - blob_url
      properties:
        file_id:
          type: string
          format: uuid
          description: Unique file identifier
        filename:
          type: string
          description: Original filename
        size_bytes:
          type: integer
          format: int64
          description: File size in bytes
        mime_type:
          type: string
          description: Detected MIME type
          example: application/vnd.openxmlformats-officedocument.presentationml.presentation
        status:
          type: string
          enum:
            - UPLOADED
          description: Initial file status after upload
        blob_url:
          type: string
          format: uri
          description: URL to the stored file in blob storage

    FileStatus:
      type: string
      enum:
        - UPLOADED
        - PROCESSING
        - COMPLETED
        - FAILED
        - PARTIAL
      description: File processing status

    FileDetails:
      type: object
      required:
        - file_id
        - filename
        - size_bytes
        - mime_type
        - status
        - blob_url
        - uploaded_at
        - org_id
      properties:
        file_id:
          type: string
          format: uuid
          description: Unique file identifier
        filename:
          type: string
          description: Original filename
        size_bytes:
          type: integer
          format: int64
          description: File size in bytes
        mime_type:
          type: string
          description: Detected MIME type
        status:
          $ref: "#/components/schemas/FileStatus"
        blob_url:
          type: string
          format: uri
          description: URL to the stored file in blob storage
        uploaded_at:
          type: string
          format: date-time
          description: Timestamp of file upload
        org_id:
          type: string
          format: uuid
          description: Organization that owns this file

    FileDetailsWithWorkflow:
      allOf:
        - $ref: "#/components/schemas/FileDetails"
        - type: object
          properties:
            workflow_status:
              $ref: "#/components/schemas/WorkflowStatus"

    WorkflowStatus:
      type: object
      required:
        - current_step
        - steps
      properties:
        current_step:
          type: string
          description: Name of the currently executing step
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStep"

    WorkflowStep:
      type: object
      required:
        - step_name
        - status
      properties:
        step_name:
          type: string
          description: Workflow step name
        status:
          type: string
          enum:
            - PENDING
            - RUNNING
            - COMPLETED
            - FAILED
            - SKIPPED
          description: Step execution status
        started_at:
          type: string
          format: date-time
          description: Step start timestamp
        completed_at:
          type: string
          format: date-time
          description: Step completion timestamp
        error_detail:
          type: string
          description: Error message if step failed

    PaginatedFileList:
      type: object
      required:
        - items
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FileDetails"
        page:
          type: integer
          description: Current page number
        page_size:
          type: integer
          description: Number of items per page
        total_items:
          type: integer
          description: Total number of items across all pages
        total_pages:
          type: integer
          description: Total number of pages
