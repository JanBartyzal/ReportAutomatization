openapi: 3.0.3
info:
  title: Report Lifecycle Service API (MS-LIFECYCLE)
  description: |
    Manages report creation, status transitions (DRAFT -> SUBMITTED ->
    UNDER_REVIEW -> APPROVED / REJECTED), bulk operations, and the
    holding-admin status matrix.
  version: 1.0.0

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: Reports
    description: Report CRUD and status transitions
  - name: Bulk Operations
    description: Approve or reject multiple reports at once
  - name: Matrix
    description: Holding-admin cross-org status matrix

paths:
  # ── Reports CRUD ──────────────────────────────────────────────────────
  /api/reports:
    get:
      tags: [Reports]
      summary: List reports
      operationId: listReports
      parameters:
        - name: org_id
          in: query
          description: Filter by organization
          schema:
            type: string
            format: uuid
        - name: period_id
          in: query
          description: Filter by period
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by report status
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated list of reports
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginationResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Reports]
      summary: Create report
      description: Creates a new report with status automatically set to DRAFT.
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: Report created (status = DRAFT)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/reports/{report_id}:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    get:
      tags: [Reports]
      summary: Get report detail
      description: Returns the report with its full status history.
      operationId: getReport
      responses:
        "200":
          description: Report detail with status history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Report"
                  - type: object
                    properties:
                      status_history:
                        type: array
                        items:
                          $ref: "#/components/schemas/StatusTransition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Status Transitions ────────────────────────────────────────────────
  /api/reports/{report_id}/submit:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    post:
      tags: [Reports]
      summary: Submit report (DRAFT -> SUBMITTED)
      operationId: submitReport
      responses:
        "200":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/reports/{report_id}/review:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    post:
      tags: [Reports]
      summary: Start review (SUBMITTED -> UNDER_REVIEW)
      operationId: reviewReport
      responses:
        "200":
          description: Report moved to review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/reports/{report_id}/approve:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    post:
      tags: [Reports]
      summary: Approve report (UNDER_REVIEW -> APPROVED)
      operationId: approveReport
      responses:
        "200":
          description: Report approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/reports/{report_id}/reject:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    post:
      tags: [Reports]
      summary: Reject report (-> REJECTED)
      operationId: rejectReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
                  minLength: 1
                  description: Reason for rejection (required)
      responses:
        "200":
          description: Report rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── History ───────────────────────────────────────────────────────────
  /api/reports/{report_id}/history:
    parameters:
      - $ref: "#/components/parameters/ReportIdPath"
    get:
      tags: [Reports]
      summary: Full state transition timeline
      operationId: getReportHistory
      responses:
        "200":
          description: Array of status transitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StatusTransition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Bulk Operations ───────────────────────────────────────────────────
  /api/reports/bulk-approve:
    post:
      tags: [Bulk Operations]
      summary: Approve multiple reports
      operationId: bulkApprove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_ids]
              properties:
                report_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Bulk approval results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/reports/bulk-reject:
    post:
      tags: [Bulk Operations]
      summary: Reject multiple reports
      operationId: bulkReject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_ids, comment]
              properties:
                report_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                comment:
                  type: string
                  minLength: 1
                  description: Reason for rejection (required)
      responses:
        "200":
          description: Bulk rejection results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOperationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Matrix ────────────────────────────────────────────────────────────
  /api/reports/matrix:
    get:
      tags: [Matrix]
      summary: Holding-admin status matrix
      description: |
        Returns a cross-organization, cross-period matrix of report statuses
        for the holding admin dashboard.
      operationId: getReportMatrix
      responses:
        "200":
          description: Status matrix
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatrixRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ═════════════════════════════════════════════════════════════════════════
# Components
# ═════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReportIdPath:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    # ── Common ────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    PaginationResponse:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer

    # ── Report ────────────────────────────────────────────────────────
    ReportStatus:
      type: string
      enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED]

    Report:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
        report_type:
          type: string
        status:
          $ref: "#/components/schemas/ReportStatus"
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateReportRequest:
      type: object
      required: [org_id, period_id, report_type]
      properties:
        org_id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
        report_type:
          type: string

    StatusTransition:
      type: object
      properties:
        from_status:
          $ref: "#/components/schemas/ReportStatus"
        to_status:
          $ref: "#/components/schemas/ReportStatus"
        changed_by:
          type: string
          format: uuid
        comment:
          type: string
          nullable: true
        changed_at:
          type: string
          format: date-time

    # ── Bulk ──────────────────────────────────────────────────────────
    BulkOperationResult:
      type: object
      properties:
        succeeded:
          type: array
          items:
            type: string
            format: uuid
        failed:
          type: array
          items:
            type: object
            properties:
              report_id:
                type: string
                format: uuid
              error:
                type: string

    # ── Matrix ────────────────────────────────────────────────────────
    MatrixRow:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
        org_name:
          type: string
        periods:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReportStatus"
          description: "Map of period_id to report status"

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict (e.g. duplicate report for org+period)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
