openapi: 3.0.3
info:
  title: Versioning Service API (MS-VER)
  description: Data versioning and diff tracking for all versionable entities
  version: 1.0.0

servers:
  - url: /api/v1
    description: Base API server

security:
  - bearerAuth: []

paths:
  /api/versions/{entity_type}/{entity_id}:
    get:
      operationId: getVersionList
      summary: Get version list
      description: >
        Returns the full version history for a given entity. Each entry includes
        the version number, timestamp, author, and a short summary of the changes.
      tags:
        - Versioning
      parameters:
        - name: entity_type
          in: path
          required: true
          description: Type of the versioned entity
          schema:
            type: string
            enum:
              - report
              - form_response
              - table_data
            example: report
        - name: entity_id
          in: path
          required: true
          description: Unique identifier of the entity
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of versions for the entity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VersionEntry"
              example:
                - version_number: 1
                  created_at: "2026-01-15T10:30:00Z"
                  created_by: "user@example.com"
                  change_summary: "Initial version"
                - version_number: 2
                  created_at: "2026-01-16T14:20:00Z"
                  created_by: "editor@example.com"
                  change_summary: "Updated revenue figures for Q4"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NOT_FOUND
                message: Entity not found

  /api/versions/{entity_type}/{entity_id}/diff:
    get:
      operationId: getVersionDiff
      summary: Get diff between versions
      description: >
        Returns a structured diff between two versions of an entity, listing
        each changed field with its old value, new value, and change type.
      tags:
        - Versioning
      parameters:
        - name: entity_type
          in: path
          required: true
          description: Type of the versioned entity
          schema:
            type: string
            enum:
              - report
              - form_response
              - table_data
            example: report
        - name: entity_id
          in: path
          required: true
          description: Unique identifier of the entity
          schema:
            type: string
            format: uuid
        - name: from_version
          in: query
          required: true
          description: Starting version number for the diff
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: to_version
          in: query
          required: true
          description: Ending version number for the diff
          schema:
            type: integer
            minimum: 1
            example: 2
      responses:
        "200":
          description: Diff between the two versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDiff"
              example:
                from_version: 1
                to_version: 2
                changes:
                  - field: "revenue_q4"
                    old_value: "1200000"
                    new_value: "1350000"
                    change_type: MODIFIED
                  - field: "notes"
                    old_value: null
                    new_value: "Adjusted for late invoices"
                    change_type: ADDED
        "400":
          description: Invalid version range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: BAD_REQUEST
                message: "from_version must be less than to_version"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entity or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Azure Entra ID v2.0 JWT token

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    VersionEntry:
      type: object
      required:
        - version_number
        - created_at
        - created_by
        - change_summary
      properties:
        version_number:
          type: integer
          description: Sequential version number starting at 1
        created_at:
          type: string
          format: date-time
          description: Timestamp when this version was created
        created_by:
          type: string
          description: Email or identifier of the user who created this version
        change_summary:
          type: string
          description: Brief human-readable summary of the changes

    VersionDiff:
      type: object
      required:
        - from_version
        - to_version
        - changes
      properties:
        from_version:
          type: integer
          description: Starting version number
        to_version:
          type: integer
          description: Ending version number
        changes:
          type: array
          description: List of field-level changes between the two versions
          items:
            $ref: "#/components/schemas/FieldChange"

    FieldChange:
      type: object
      required:
        - field
        - change_type
      properties:
        field:
          type: string
          description: Name of the changed field
        old_value:
          type: string
          nullable: true
          description: Previous value (null for ADDED changes)
        new_value:
          type: string
          nullable: true
          description: New value (null for REMOVED changes)
        change_type:
          type: string
          enum:
            - ADDED
            - MODIFIED
            - REMOVED
          description: Type of change applied to this field
