<svg width="1200" height="2800" viewBox="0 0 1200 2800" xmlns="http://www.w3.org/2000/svg">
  <!-- CloudInfraMap (CIM) Design System - Complete Atoms Library (Round 5) -->
  <rect width="1200" height="2800" fill="#FBFBFB"/>
  
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#1B1A19">CloudInfraMap (CIM) — Atoms Matrix (Rev 5)</text>
  
  <!-- 1. BUTTONS SECTION (Complete) -->
  <text x="40" y="100" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#323130">1. Buttons (Icon variants & Sizes)</text>
  <g transform="translate(40, 130)">
    <rect width="100" height="32" rx="4" fill="#0078D4"/><text x="50" y="21" font-family="Inter" font-size="12" text-anchor="middle" fill="#FFFFFF">Primary</text>
    <rect x="120" width="100" height="32" rx="4" fill="none" stroke="#8A8886"/><text x="170" y="21" font-family="Inter" font-size="12" text-anchor="middle" fill="#323130">Outline</text>
    <!-- Icons -->
    <g transform="translate(240, 0)">
        <rect width="110" height="32" rx="4" fill="#0078D4"/>
        <path d="M12 10 L16 16 L8 16 Z" fill="#FFFFFF" transform="translate(6, 0)"/>
        <text x="65" y="21" font-family="Inter" font-size="12" text-anchor="middle" fill="#FFFFFF">Left Icon</text>
    </g>
  </g>
  
  <!-- 2. INPUT FIELDS SECTION (Refined with Addons) -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#323130">2. Input Fields (Fluent UI Native API: Prefix/Suffix)</text>
  
  <g transform="translate(40, 360)">
    <!-- Prefix Text Addon -->
    <text x="0" y="15" font-family="Inter" font-size="12" font-weight="600" fill="#616161">Prefix Text (e.g. Protocol)</text>
    <rect y="25" width="300" height="32" rx="4" fill="#FFFFFF" stroke="#8A8886"/>
    <rect y="25" width="60" height="31" rx="4 0 0 4" fill="#F3F2F1" stroke="#8A8886"/>
    <text x="30" y="46" font-family="Inter" font-size="12" text-anchor="middle" fill="#616161">https://</text>
    <text x="70" y="46" font-family="Inter" font-size="13" fill="#242424">cloudinframap.cz</text>

    <!-- Suffix Text Addon -->
    <g transform="translate(340, 0)">
        <text x="0" y="15" font-family="Inter" font-size="12" font-weight="600" fill="#616161">Suffix Text (e.g. Domain)</text>
        <rect y="25" width="300" height="32" rx="4" fill="#FFFFFF" stroke="#8A8886"/>
        <rect x="220" y="25" width="80" height="31" rx="0 4 4 0" fill="#F3F2F1" stroke="#8A8886"/>
        <text x="260" y="46" font-family="Inter" font-size="12" text-anchor="middle" fill="#616161">.com</text>
        <text x="12" y="46" font-family="Inter" font-size="13" fill="#242424">my-app-service</text>
    </g>

    <!-- Prefix Icon Addon (Search Style) -->
    <g transform="translate(0, 90)">
        <text x="0" y="15" font-family="Inter" font-size="12" font-weight="600" fill="#616161">Prefix Icon (Search)</text>
        <rect y="25" width="300" height="32" rx="4" fill="#FFFFFF" stroke="#8A8886"/>
        <circle cx="20" cy="41" r="5" fill="none" stroke="#616161" stroke-width="1.5"/>
        <line x1="24" y1="45" x2="28" y2="49" stroke="#616161" stroke-width="1.5"/>
        <text x="35" y="46" font-family="Inter" font-size="13" fill="#A19F9D">Hledat zdroje...</text>
    </g>

    <!-- Suffix Icon Addon (Password/Select) -->
    <g transform="translate(340, 90)">
        <text x="0" y="15" font-family="Inter" font-size="12" font-weight="600" fill="#616161">Suffix Icon (Password Eye)</text>
        <rect y="25" width="300" height="32" rx="4" fill="#FFFFFF" stroke="#8A8886"/>
        <text x="12" y="46" font-family="Inter" font-size="13" fill="#242424">••••••••</text>
        <circle cx="280" cy="41" r="5" fill="none" stroke="#616161" stroke-width="1.5"/><circle cx="280" cy="41" r="1.5" fill="#616161"/>
    </g>

    <!-- Round 5: Double Addons -->
    <g transform="translate(0, 180)">
        <text x="0" y="15" font-family="Inter" font-size="12" font-weight="600" fill="#616161">Double Addons (Fluent UI Style)</text>
        <rect y="25" width="640" height="32" rx="4" fill="#FFFFFF" stroke="#8A8886"/>
        <rect y="25" width="40" height="31" rx="4 0 0 4" fill="#F3F2F1" stroke="#8A8886"/><text x="20" y="45" font-size="16" text-anchor="middle">🔍</text>
        <rect x="580" y="25" width="60" height="31" rx="0 4 4 0" fill="#F3F2F1" stroke="#8A8886"/><text x="610" y="45" font-size="10" font-weight="bold" text-anchor="middle">Kč</text>
        <text x="50" y="46" font-family="Inter" font-size="13" fill="#242424">Dynamic search with localized currency...</text>
    </g>
  </g>
  
  <!-- 3. BADGES & AVATARS -->
  <text x="40" y="700" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#323130">3. Badges, Tiers & Avatars</text>
  <g transform="translate(40, 740)">
    <rect y="0" width="70" height="20" rx="4" fill="#E0F2FE"/><text x="35" y="14" font-family="Inter" font-size="10" font-weight="bold" text-anchor="middle" fill="#0369A1">MICRO</text>
    <circle cx="150" cy="10" r="16" fill="#0078D4"/><text x="150" y="15" font-family="Inter" font-size="12" text-anchor="middle" fill="#FFFFFF">JD</text>
  </g>
</svg>
