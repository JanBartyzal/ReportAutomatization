<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- CloudInfraMap (CIM) Icon Library -->
  <rect width="600" height="800" fill="#FFFFFF"/>
  <text x="30" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#1B1A19">CIM Icon Grid (24px Vectors)</text>
  
  <g transform="translate(30, 80)">
    <!-- 1. Infrastructure -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#616161">Infrastructure</text>
    
    <!-- Server -->
    <g transform="translate(0, 20)">
      <rect x="2" y="4" width="20" height="6" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><rect x="2" y="14" width="20" height="6" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/>
      <circle cx="6" cy="7" r="1" fill="#242424"/><circle cx="6" cy="17" r="1" fill="#242424"/>
    </g>
    <!-- Database -->
    <g transform="translate(50, 20)">
      <ellipse cx="12" cy="7" rx="8" ry="3" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M4 7V17C4 18.6 7.5 20 12 20C16.5 20 20 18.6 20 17V7" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M4 12C4 13.6 7.5 15 12 15C16.5 15 20 13.6 20 12" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    <!-- Network (Hub) -->
    <g transform="translate(100, 20)">
      <circle cx="12" cy="12" r="4" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M12 8V2M12 22V16M8 12H2M22 12H16" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    <!-- Storage (Disk) -->
    <g transform="translate(150, 20)">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#242424" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    
    <!-- 2. Navigation -->
    <text x="0" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#616161">Navigation</text>
    <g transform="translate(0, 120)">
      <!-- Dashboard -->
      <rect x="3" y="3" width="8" height="8" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><rect x="13" y="3" width="8" height="12" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><rect x="3" y="13" width="8" height="8" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><rect x="13" y="17" width="8" height="4" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    <g transform="translate(50, 120)">
      <!-- Designer (Nodes) -->
      <rect x="2" y="2" width="6" height="6" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><rect x="16" y="16" width="6" height="6" rx="1" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M8 5C12 5 12 19 16 19" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    <g transform="translate(100, 120)">
      <!-- Reports -->
      <path d="M4 20H20M7 20V14M12 20V10M17 20V4" fill="none" stroke="#242424" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(150, 120)">
      <!-- Admin (Users) -->
      <circle cx="12" cy="8" r="4" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M4 20C4 17 8 16 12 16C16 16 20 17 20 20" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>

    <!-- 3. Actions -->
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#616161">Actions</text>
    <g transform="translate(0, 220)">
      <!-- Lock -->
      <rect x="5" y="10" width="14" height="10" rx="2" fill="none" stroke="#242424" stroke-width="1.5"/><path d="M8 10V7C8 4.8 9.8 3 12 3C14.2 3 16 4.8 16 7V10" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>
    <g transform="translate(50, 220)">
      <!-- Export -->
      <path d="M12 3V15M12 15L8 11M12 15L16 11M4 20H20" fill="none" stroke="#242424" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(100, 220)">
      <!-- Filter -->
      <path d="M4 5H20L14 12V19L10 21V12L4 5Z" fill="none" stroke="#242424" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g transform="translate(150, 220)">
      <!-- Delete -->
      <path d="M4 6H20M6 6V19C6 20.1 6.9 21 8 21H16C17.1 21 18 20.1 18 19V6M9 6V4H15V6" fill="none" stroke="#242424" stroke-width="1.5"/>
    </g>

    <!-- 4. Status -->
    <text x="0" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#616161">Status</text>
    <g transform="translate(0, 320)">
      <!-- Check -->
      <path d="M4 12L10 18L20 6" fill="none" stroke="#107C10" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(50, 320)">
      <!-- Error -->
      <circle cx="12" cy="12" r="10" fill="none" stroke="#D13438" stroke-width="1.5"/><path d="M12 7V13M12 17H12.01" fill="none" stroke="#D13438" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(100, 320)">
      <!-- Warning -->
      <path d="M12 2L2 21H22L12 2Z" fill="none" stroke="#D83B01" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 9V14M12 18H12.01" fill="none" stroke="#D83B01" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(150, 320)">
      <!-- Info -->
      <circle cx="12" cy="12" r="10" fill="none" stroke="#0078D4" stroke-width="1.5"/><path d="M12 17V11M12 7H12.01" fill="none" stroke="#0078D4" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  
  <text x="30" y="550" font-family="Inter, sans-serif" font-size="12" fill="#9E9E9E">Všechny ikony jsou ve vektorech, připraveny pro změnu barev a měřítka.</text>
</svg>
