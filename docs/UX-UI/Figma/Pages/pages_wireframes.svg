<svg width="1200" height="1000" viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- CIM Design System - Page Wireframes -->
  <rect width="1200" height="1000" fill="#F3F2F1"/>
  
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#242424">03 — Page Wireframes</text>
  
  <!-- Dashboard Layout Wireframe -->
  <g transform="translate(40, 100) scale(0.6)">
    <rect width="1440" height="900" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="2"/>
    
    <!-- TopNav -->
    <rect width="1440" height="64" fill="#1B1A19"/>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">CloudInfraMap</text>
    <rect x="400" y="16" width="600" height="32" rx="4" fill="#323130"/>
    <circle cx="1380" cy="32" r="16" fill="#0078D4"/>
    
    <!-- Sidebar -->
    <rect y="64" width="260" height="836" fill="#F8F8F8" stroke="#E1DFDD" stroke-width="1"/>
    <rect x="20" y="100" width="220" height="40" rx="8" fill="#E1DFDD"/>
    <rect x="20" y="160" width="220" height="40" rx="8" fill="none" stroke="#E1DFDD" stroke-width="1"/>
    
    <!-- Main Content -->
    <text x="300" y="120" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#242424">Dashboard</text>
    
    <!-- Hero Card -->
    <rect x="300" y="150" width="1100" height="200" rx="16" fill="#1B3F6A"/>
    <text x="340" y="220" font-family="Inter, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">Kč 1 234 567</text>
    <text x="340" y="260" font-family="Inter, sans-serif" font-size="18" fill="#7AB2FF">Měsíční náklady na cloud</text>
    
    <!-- Small Cards Grid -->
    <rect x="300" y="380" width="350" height="150" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    <rect x="675" y="380" width="350" height="150" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    <rect x="1050" y="380" width="350" height="150" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    
    <!-- Large Widget -->
    <rect x="300" y="560" width="1100" height="300" rx="12" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    <text x="320" y="595" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#616161">Rozložení nákladů (Treemap placeholder)</text>
    <rect x="320" y="620" width="1060" height="220" rx="4" fill="#F3F2F1"/>
  </g>
  
  <text x="40" y="670" font-family="Inter, sans-serif" font-size="14" fill="#616161">Představený layout využívá standardní 1440px mřížku.</text>
</svg>
