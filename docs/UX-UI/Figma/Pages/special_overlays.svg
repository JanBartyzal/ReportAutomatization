<svg width="1000" height="1200" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- CloudInfraMap (CIM) — Special Overlays & Error States -->
  <rect width="1000" height="1200" fill="#FBFBFB"/>
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="28" font-weight="bold" fill="#1B1A19">04 — Special Overlays & Error States</text>

  <!-- 1. LOCKED FEATURE OVERLAYS (3 Modes) -->
  <text x="40" y="100" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#616161">1. Locked Feature Overlays</text>
  
  <g transform="translate(40, 130)">
    <!-- Mode: Blur -->
    <rect width="280" height="180" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    <rect x="10" y="10" width="260" height="160" fill="rgba(0,120,212,0.05)"/>
    <circle cx="140" cy="70" r="30" fill="#FFFFFF" style="filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));"/>
    <text x="140" y="78" font-family="Inter, sans-serif" font-size="24" text-anchor="middle">🔒</text>
    <text x="140" y="120" font-family="Inter, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#6D28D9">RESERVED FOR PRO</text>
    <rect x="90" y="140" width="100" height="24" rx="4" fill="#0078D4"/><text x="140" y="156" font-family="Inter, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#FFFFFF">UPGRADE →</text>
    <text x="140" y="200" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#9E9E9E">Mode: Blur / Soft Lock</text>

    <!-- Mode: Skeleton -->
    <g transform="translate(320, 0)">
      <rect width="280" height="180" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
      <rect x="20" y="30" width="200" height="12" rx="2" fill="#F3F2F1"/>
      <rect x="20" y="55" width="150" height="12" rx="2" fill="#F3F2F1"/>
      <rect width="280" height="180" rx="8" fill="rgba(255,255,255,0.6)"/>
      <text x="140" y="95" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1B1A19">Feature Unavailable</text>
      <text x="140" y="200" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#9E9E9E">Mode: Skeleton Placeholder</text>
    </g>

    <!-- Mode: Screenshot / Teaser -->
    <g transform="translate(640, 0)">
      <rect width="280" height="180" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
      <path d="M20 150 L60 100 L120 130 L180 80 L240 120" stroke="#E1DFDD" stroke-width="2" fill="none"/>
      <rect width="280" height="180" rx="8" fill="rgba(0,0,0,0.6)"/>
      <text x="140" y="90" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">See what you're missing</text>
      <text x="140" y="115" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#CCCCCC">Unlock automated geo-arbitrage</text>
      <text x="140" y="200" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#9E9E9E">Mode: Teaser Overlay</text>
    </g>
  </g>

  <!-- 2. ERROR STATES (404, 500, Offline) -->
  <text x="40" y="450" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#616161">2. System Error States</text>
  
  <g transform="translate(40, 480)">
    <!-- 404 Not Found -->
    <rect width="280" height="350" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
    <text x="140" y="100" font-family="Inter, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="#0078D4">404</text>
    <text x="140" y="150" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#242424">Stránka nenalezena</text>
    <text x="140" y="180" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#616161">Omlouváme se, ale tuto cestu jsme v mracích nenašli.</text>
    <rect x="70" y="240" width="140" height="32" rx="4" fill="#0078D4"/><text x="140" y="261" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#FFFFFF">Zpět na Dashboard</text>
    
    <!-- 500 Server Error -->
    <g transform="translate(320, 0)">
      <rect width="280" height="350" rx="8" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>
      <text x="140" y="100" font-family="Inter, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="#D13438">500</text>
      <text x="140" y="150" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#242424">Chyba v matrixu</text>
      <text x="140" y="180" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#616161">Něco se pokazilo na naší straně. Zkuste to prosím později.</text>
      <text x="140" y="320" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#9E9E9E">Error ID: 0x80041001</text>
    </g>

    <!-- Offline State -->
    <g transform="translate(640, 0)">
      <rect width="280" height="350" rx="8" fill="#F3F2F1" stroke="#E1DFDD" stroke-width="1"/>
      <text x="140" y="100" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">📡</text>
      <text x="140" y="150" font-family="Inter, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#242424">Právě jste offline</text>
      <text x="140" y="180" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#616161">Zkontrolujte své připojení k internetu.</text>
      <circle cx="140" cy="220" r="4" fill="#8A8886"/>
    </g>
  </g>
</svg>
