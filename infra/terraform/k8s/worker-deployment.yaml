apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: cloudinframap-worker
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudinframap-worker
  template:
    metadata:
      labels:
        app: cloudinframap-worker
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "worker"
        dapr.io/app-port: "8000"
    spec:
      containers:
      - name: worker
        image: cloudinframap/worker:latest
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: postgres_host
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: postgres_port
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis_port
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: postgres_password
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
spec:
  selector:
    app: cloudinframap-worker
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
