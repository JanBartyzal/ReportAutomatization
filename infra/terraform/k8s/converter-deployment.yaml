apiVersion: apps/v1
kind: Deployment
metadata:
  name: converter-deployment
  labels:
    app: cloudinframap-converter
    component: converter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudinframap-converter
  template:
    metadata:
      labels:
        app: cloudinframap-converter
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "converter"
        dapr.io/app-port: "8000"
    spec:
      containers:
      - name: converter
        image: cloudinframap/converter:latest
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: postgres_host
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis_host
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: postgres_password
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        # Security context for isolated sandbox
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: converter-service
spec:
  selector:
    app: cloudinframap-converter
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
