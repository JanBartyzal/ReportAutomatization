apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: mv-refresh-cron
  # TASK-ABF-006: Materialized View Refresh Cron Job
  # Triggers POST /api/v1/internal/mv/refresh-cron on unit-web-gateway every 5 minutes.
  # Uses REFRESH MATERIALIZED VIEW CONCURRENTLY — no read blocking.
scopes:
  - unit-web-gateway
spec:
  type: bindings.cron
  version: v1
  metadata:
  - name: schedule
    # Every 5 minutes — matches TASK-ABF-006 requirement
    value: "@every 5m"
  - name: direction
    value: "input"
