apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-pg
spec:
  type: state.postgresql
  version: v1
  metadata:
  - name: connectionString
    value: "host=postgres user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} port=5432 connect_timeout=10 database=${POSTGRES_DB} sslmode=disable"
  - name: tableName
    value: "dapr_state"
  - name: keyPrefix
    value: "name"
