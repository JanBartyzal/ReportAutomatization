# Docker Compose Override for Debug Mode
# This file is automatically merged by `docker compose up`
#
# It adds debug ports and development-specific configurations
# for the P8 consolidated architecture.
#
# Debug port allocation:
#   engine-core:         5005
#   engine-ingestor:     5006
#   engine-orchestrator: 5007
#   engine-data:         5008
#   engine-reporting:    5009
#   engine-integrations: 5010
#   processor-atomizers: 5678 (Python debugpy)

services:
  # =============================================================================
  # DEBUG JAVA SERVICES
  # =============================================================================

  engine-core:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5005:5005"

  engine-ingestor:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5006:5005"

  engine-orchestrator:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5007:5005"

  engine-data:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5008:5005"

  engine-reporting:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5009:5005"

  engine-integrations:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - LOG_LEVEL=DEBUG
    ports:
      - "5010:5005"

  # =============================================================================
  # DEBUG PYTHON SERVICES
  # =============================================================================

  processor-atomizers:
    environment:
      - DEBUG=1
      - PYTHONBREAKPOINT=pdb.set_trace
    ports:
      - "5678:5678" # Remote debugger port

  processor-generators:
    environment:
      - LOG_LEVEL=DEBUG

  # =============================================================================
  # INFRASTRUCTURE DEBUG PORTS
  # =============================================================================

  postgres:
    ports:
      - "5433:5432" # Debug port for postgres

  redis:
    ports:
      - "6380:6379" # Debug port for redis

  # =============================================================================
  # NGINX DEBUG
  # =============================================================================

  router:
    volumes:
      - ../../apps/router/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-error-logs:/var/log/nginx:rw

  # =============================================================================
  # DEVELOPMENT SPECIFIC
  # =============================================================================

  frontend:
    environment:
      - VITE_DEBUG=true
