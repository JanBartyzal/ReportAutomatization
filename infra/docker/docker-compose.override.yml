# Docker Compose Override for Debug Mode
# This file adds debug ports and development-specific configurations
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# This will:
#   - Expose debug ports for Java services (port 5005)
#   - Enable Java remote debugging
#   - Add development-specific environment variables

services:
  # =============================================================================
  # DEBUG JAVA SERVICES
  # =============================================================================

  ms-auth:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5005:5005"

  ms-ing:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5006:5005"

  ms-orch:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5007:5005"

  ms-scan:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5008:5005"

  ms-sink-tbl:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5009:5005"

  ms-sink-doc:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5010:5005"

  ms-sink-log:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=docker,debug
    ports:
      - "5011:5005"

  ms-ext-snow:
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5012
      - LOG_LEVEL=DEBUG
    ports:
      - "5012:5012"

  # =============================================================================
  # DEBUG PYTHON SERVICES
  # =============================================================================

  ms-atm-pptx:
    environment:
      - DEBUG=1
      - PYTHONBREAKPOINT=pdb.set_trace
    ports:
      - "5678:5678" # Remote debugger port

  ms-gen-xls:
    environment:
      - LOG_LEVEL=DEBUG

  # =============================================================================
  # INFRASTRUCTURE DEBUG PORTS
  # =============================================================================

  postgres:
    ports:
      - "5433:5432" # Debug port for postgres

  redis:
    ports:
      - "6380:6379" # Debug port for redis

  # =============================================================================
  # DAPR SIDECAR DEBUG
  # =============================================================================

  dapr:
    ports:
      - "3501:3500" # Additional Dapr HTTP port
      - "50001:50001" # Additional Dapr gRPC port
      - "9090:8080" # Dapr metrics

  # =============================================================================
  # NGINX DEBUG
  # =============================================================================

  ms-gw:
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-error-logs:/var/log/nginx:rw

  # =============================================================================
  # DEVELOPMENT SPECIFIC
  # =============================================================================

  ms-fe:
    environment:
      - VITE_DEBUG=true
