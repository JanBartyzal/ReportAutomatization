# Dapr State Store Component Configuration
# Uses Redis for distributed state management
# Updated for P8 consolidated architecture
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis:6379"
    - name: redisPassword
      value: "${REDIS_PASSWORD:-redis_pass}"
    - name: keyPrefix
      value: "statestore"
    - name: valueType
      value: "json"
    - name: consistency
      value: "strong"
    - name: actorStateStore
      value: "false"
    - name: transactionMode
      value: "multi"
    - name: maxTtlSeconds
      value: "86400"
scopes:
  # Consolidated units (P8)
  - engine-core
  - engine-data
  - engine-reporting
  - engine-orchestrator
  - engine-integrations
  - processor-atomizers
  - processor-generators
  # Standalone services
  - ms-ing
  - ms-scan
