# Dapr StateStore configuration for engine-data
# engine-data: ms-sink-tbl + ms-sink-doc + ms-sink-log + ms-qry + ms-dash + ms-srch + ms-tmpl
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: keyPrefix
      value: engine-data
