# Dapr PubSub configuration for engine-integrations
# engine-integrations: ms-ext-snow (ServiceNow)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-pubsub
  namespace: default
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: consumerGroup
      value: engine-integrations-group
