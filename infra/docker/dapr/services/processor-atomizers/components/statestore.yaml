# Dapr StateStore configuration for processor-atomizers
# processor-atomizers: ms-atm-pptx + ms-atm-xls + ms-atm-pdf + ms-atm-csv + ms-atm-ai + ms-atm-cln
# Minimal - uses Redis for caching only
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: keyPrefix
      value: processor-atomizers
