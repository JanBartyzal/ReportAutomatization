# Dapr PubSub configuration for engine-orchestrator
# engine-orchestrator: Workflow orchestration (was ms-orch)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-pubsub
  namespace: default
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: consumerGroup
      value: engine-orchestrator-group
