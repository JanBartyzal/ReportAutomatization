# Dapr StateStore configuration for engine-orchestrator
# engine-orchestrator: Workflow orchestration (was ms-orch)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: keyPrefix
      value: engine-orchestrator
