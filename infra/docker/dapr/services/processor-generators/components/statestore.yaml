# Dapr StateStore configuration for processor-generators
# processor-generators: ms-gen-pptx + ms-gen-xls + ms-mcp
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reportplatform-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: keyPrefix
      value: processor-generators
