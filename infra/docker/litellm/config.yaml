# LiteLLM Proxy Configuration
# Routes LLM requests to local Ollama (default) + Azure OpenAI (fallback)

model_list:
  # Default model — local Ollama gemma4:e4b
  - model_name: gemma
    litellm_params:
      model: ollama/gemma4:e4b
      api_base: ${OLLAMA_API_BASE:-http://host.docker.internal:11434}

  # Azure OpenAI fallback (optional)
  - model_name: azure-gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_base: ${AZURE_OPENAI_ENDPOINT:-https://your-endpoint.openai.azure.com}
      api_key: ${AZURE_OPENAI_API_KEY:-sk-placeholder}
      api_version: "2024-06-01"

  - model_name: text-embedding-3-small
    litellm_params:
      model: azure/text-embedding-3-small
      api_base: ${AZURE_OPENAI_ENDPOINT:-https://your-endpoint.openai.azure.com}
      api_key: ${AZURE_OPENAI_API_KEY:-sk-placeholder}
      api_version: "2024-06-01"

general_settings:
  master_key: ${LITELLM_MASTER_KEY:-sk-local-dev-key}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
