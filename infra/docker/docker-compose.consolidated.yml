# ReportAutomatization P8 - Consolidated Topology Docker Compose
# Consolidated from 29+ microservices into ~8 deployment units
#
# Usage:
#   docker compose -f docker-compose.consolidated.yml up -d
#   docker compose -f docker-compose.consolidated.yml down
#
# Consolidated Services:
#   - engine-core:       ms-auth + ms-admin + ms-batch + ms-ver + ms-audit
#   - engine-data:       ms-sink-tbl + ms-sink-doc + ms-sink-log + ms-qry + ms-dash + ms-srch + ms-tmpl
#   - engine-reporting:  ms-lifecycle + ms-period + ms-form + ms-tmpl-pptx + ms-notif
#   - engine-orchestrator: ms-orch (unchanged, independent)
#   - processor-atomizers: ms-atm-pptx + ms-atm-xls + ms-atm-pdf + ms-atm-csv + ms-atm-ai + ms-atm-cln
#   - processor-generators: ms-gen-pptx + ms-gen-xls + ms-mcp
#   - engine-integrations: ms-ext-snow (unchanged for now)
#   - ms-gw: Nginx API Gateway (unchanged)
#   - ms-ing: Ingestion (unchanged - tightly coupled to upload flow)
#   - ms-scan: Scanner (unchanged - tightly coupled to ClamAV)

services:
  # =============================================================================
  # API GATEWAY - Nginx
  # =============================================================================
  ms-gw:
    build:
      context: ../../apps/engine/microservices/units/ms-gw
      dockerfile: Dockerfile
    image: nginx:alpine
    container_name: ms-gw
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.consolidated.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      engine-core:
        condition: service_healthy
      ms-ing:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # CONSOLIDATED JAVA SERVICES
  # =============================================================================

  # ENGINE-CORE: Auth + Admin + Batch + Versioning + Audit
  engine-core:
    build:
      context: ../../
      dockerfile: apps/engine/engine-core/Dockerfile
    container_name: engine-core
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${ENGINE_CORE_DB:-reportplatform}
      - DB_USERNAME=${ENGINE_CORE_DB_USER:-engine_core_user}
      - DB_PASSWORD=${ENGINE_CORE_DB_PASS:-engine_core_pass}
      - DB_SCHEMA=${ENGINE_CORE_DB_SCHEMA:-core}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_KEYVAULT_URI=${AZURE_KEYVAULT_URI:-}
      - JWT_ISSUER=${JWT_ISSUER:-https://login.microsoftonline.com/common/v2.0}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-https://login.microsoftonline.com/common/discovery/v2.0/keys}
      - LOG_LEVEL=INFO
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # MS-ING - File Ingestion Service (unchanged)
  ms-ing:
    build:
      context: ../../apps/engine/microservices/units/ms-ing
      dockerfile: Dockerfile
    container_name: ms-ing
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ms_ing
      - DB_USERNAME=ms_ing
      - DB_PASSWORD=${DB_PASSWORD:-ms_ing_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_LEVEL=INFO
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ENGINE-ORCHESTRATOR (unchanged, independent scaling)
  engine-orchestrator:
    build:
      context: ../../apps/engine/microservices/units/ms-orch
      dockerfile: Dockerfile
    container_name: engine-orchestrator
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=orch_db
      - DB_USERNAME=orch_user
      - DB_PASSWORD=${DB_PASSWORD:-orch_pass}
      - GRPC_PORT=50051
      - HTTP_PORT=8080
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - LOG_LEVEL=INFO
    ports:
      - "8083:8080"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS-SCAN - Security Scanner (unchanged)
  ms-scan:
    build:
      context: ../../apps/engine/microservices/units/ms-scan
      dockerfile: Dockerfile
    container_name: ms-scan
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - LOG_LEVEL=INFO
    ports:
      - "8084:8080"
    depends_on:
      clamav:
        condition: service_healthy
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ENGINE-DATA: Sinks + Query + Dashboard + Search + Template
  engine-data:
    build:
      context: ../../
      dockerfile: apps/engine/engine-data/Dockerfile
    container_name: engine-data
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${ENGINE_DATA_DB:-reportplatform}
      - DB_USERNAME=${ENGINE_DATA_DB_USER:-engine_data_user}
      - DB_PASSWORD=${ENGINE_DATA_DB_PASS:-engine_data_pass}
      - DB_SCHEMA=${ENGINE_DATA_DB_SCHEMA:-data}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - MAPPING_AI_ENABLED=true
      - MAPPING_AI_DAPR_APP_ID=processor-atomizers
      - LOG_LEVEL=INFO
    ports:
      - "8100:8100"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8100/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-REPORTING: Lifecycle + Period + Form + PPTX Template + Notification
  engine-reporting:
    build:
      context: ../../
      dockerfile: apps/engine/engine-reporting/Dockerfile
    container_name: engine-reporting
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${ENGINE_REPORTING_DB:-reportplatform}
      - DB_USERNAME=${ENGINE_REPORTING_DB_USER:-engine_reporting_user}
      - DB_PASSWORD=${ENGINE_REPORTING_DB_PASS:-engine_reporting_pass}
      - DB_SCHEMA=${ENGINE_REPORTING_DB_SCHEMA:-reporting}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=templates
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - LOG_LEVEL=INFO
    ports:
      - "8105:8105"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8105/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-INTEGRATIONS: ServiceNow (unchanged for now)
  engine-integrations:
    build:
      context: ../../
      dockerfile: apps/engine/microservices/units/ms-ext-snow/Dockerfile
    container_name: engine-integrations
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reportplatform
      - DB_USERNAME=snow_user
      - DB_PASSWORD=${DB_PASSWORD:-snow_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - AZURE_KEYVAULT_URI=${AZURE_KEYVAULT_URI:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - JWT_ISSUER=${JWT_ISSUER:-https://login.microsoftonline.com/common/v2.0}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-https://login.microsoftonline.com/common/discovery/v2.0/keys}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8107:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================================================
  # CONSOLIDATED PYTHON SERVICES
  # =============================================================================

  # PROCESSOR-ATOMIZERS: All extractors in one unit
  processor-atomizers:
    build:
      context: ../../
      dockerfile: apps/processor/processor-atomizers/Dockerfile
    container_name: processor-atomizers
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=processor-atomizers
      - HTTP_PORT=8088
      - GRPC_PORT=50200
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - TEMP_CONTAINER=temp
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY:-sk-local-dev-key}
      - DEFAULT_MONTHLY_TOKEN_QUOTA=1000000
      - MAX_CONCURRENT_PER_ORG=5
      - CLEANUP_INTERVAL_HOURS=6
      - CLEANUP_DRY_RUN=false
      - LOG_LEVEL=INFO
    ports:
      - "8088:8088"
      - "50200:50200"
    volumes:
      - tesseract_data:/usr/share/tesseract-ocr/5/tessdata
    depends_on:
      azurite:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PROCESSOR-GENERATORS: PPTX + Excel generators + MCP
  processor-generators:
    build:
      context: ../../
      dockerfile: apps/processor/processor-generators/Dockerfile
    container_name: processor-generators
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=processor-generators
      - HTTP_PORT=8111
      - GRPC_PORT=50201
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - TEMPLATES_CONTAINER=templates
      - GENERATED_CONTAINER=generated-reports
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reportplatform
      - DB_USER=ms_qry
      - DB_PASSWORD=${DB_PASSWORD:-ms_qry_pass}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - MPLBACKEND=Agg
      - LOG_LEVEL=INFO
    ports:
      - "8111:8111"
      - "50201:50201"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8111/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================================================
  # FRONTEND
  # =============================================================================

  ms-fe:
    image: node:20-alpine
    container_name: ms-fe
    working_dir: /app
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost
      - VITE_AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - VITE_AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - VITE_AZURE_REDIRECT_URI=http://localhost
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      ms-gw:
        condition: service_started
    networks:
      - report-net

  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=reportplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d reportplatform" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - report-net

  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - report-net

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --silent
    volumes:
      - azurite_data:/data
    ports:
      - "10000:10000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  clamav:
    image: clamav/clamav:latest
    container_name: clamav
    environment:
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_FRESHCLAMD=true
      - CLAMAV_NO_MILTERD=true
    volumes:
      - clamav_data:/var/lib/clamav
      - ./clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    ports:
      - "3310:3310"
    command: clamd --config-file=/etc/clamav/clamd.conf --Foreground=true
    healthcheck:
      test: [ "CMD", "clamdscan", "--ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - report-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    command: --config /app/config.yaml --port 4000
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-https://placeholder.openai.azure.com}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-sk-placeholder}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev-key}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MH_MAILDIR_PATH=/mail
    volumes:
      - mailhog_data:/mail
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8025" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dapr:
    image: daprio/dapr:1.14.0
    container_name: dapr
    command: "./placement -port 50006 -0.0.0.0"
    ports:
      - "50006:50006"
      - "3500:3500"
      - "50001:50001"
      - "8080:8080"
    volumes:
      - ./dapr/components:/components:ro
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3500/v1.0/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  report-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  azurite_data:
  clamav_data:
  tesseract_data:
  mailhog_data:
