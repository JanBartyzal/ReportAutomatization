# Nginx API Gateway Configuration for ReportAutomatization P1
# Routes external requests to appropriate microservices

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # RATE LIMITING ZONES
    # =============================================================================

    # API rate limit: 100 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Auth rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=10r/s;

    # Upload rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=upload_limit:1m rate=10r/s;

    # =============================================================================
    # UPSTREAM BACKENDS
    # =============================================================================

    upstream ms_auth {
        server ms-auth:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_ing {
        server ms-ing:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_orch {
        server ms-orch:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_qry {
        server ms-qry:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_dash {
        server ms-dash:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_lifecycle {
        server ms-lifecycle:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_period {
        server ms-period:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_notif {
        server ms-notif:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_form {
        server ms-form:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_ver {
        server ms-ver:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_audit {
        server ms-audit:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_srch {
        server ms-srch:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_tmpl_pptx {
        server ms-tmpl-pptx:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_ext_snow {
        server ms-ext-snow:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_gen_xls {
        server ms-gen-xls:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =============================================================================
    # SERVER CONFIGURATION
    # =============================================================================

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Readiness check
        location /ready {
            access_log off;
            return 200 "READY\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # AUTH SERVICE ROUTES
        # =============================================================================

        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://ms_auth/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers (for preflight)
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # UPLOAD SERVICE ROUTES
        # =============================================================================

        location /api/upload/ {
            limit_req zone=upload_limit burst=10 nodelay;

            proxy_pass http://ms_ing/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Increased timeouts for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Maximum upload size: 100MB
            client_max_body_size 100M;
            proxy_request_buffering off;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # ORCHESTRATOR SERVICE ROUTES
        # =============================================================================

        location /api/orch/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_orch/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # QUERY SERVICE ROUTES (P2)
        # =============================================================================

        location /api/query/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_qry/api/query/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # DASHBOARD SERVICE ROUTES (P2)
        # =============================================================================

        location /api/dashboards/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_dash/api/dashboards/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # REPORT LIFECYCLE SERVICE ROUTES (P3b)
        # =============================================================================

        location /api/reports/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_lifecycle/api/reports/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # PERIOD MANAGEMENT SERVICE ROUTES (P3b)
        # =============================================================================

        location /api/periods/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_period/api/periods/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # NOTIFICATION SERVICE ROUTES (P3b)
        # =============================================================================

        location /api/notifications/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_notif/api/v1/notifications/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # WebSocket for real-time notifications
        location /ws/notifications {
            proxy_pass http://ms_notif;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # =============================================================================
        # FORM SERVICE ROUTES (P3c)
        # =============================================================================

        location /api/forms/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_form/api/forms/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Allow Excel file uploads (50MB)
            client_max_body_size 50M;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # VERSIONING SERVICE ROUTES (P4a)
        # =============================================================================

        location /api/versions/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_ver/api/versions/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # AUDIT SERVICE ROUTES (P4a)
        # =============================================================================

        location /api/audit/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_audit/api/audit/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # SEARCH SERVICE ROUTES (P4a)
        # =============================================================================

        location /api/search/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_srch/api/v1/search/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # PPTX TEMPLATE SERVICE ROUTES (P4b)
        # =============================================================================

        location /api/templates/pptx/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://ms_tmpl_pptx/api/templates/pptx/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Allow large template uploads
            client_max_body_size 100m;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Org-Id, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # SERVICE-NOW INTEGRATION ROUTES (P7)
        # =============================================================================

        # Service-Now Integration API
        location /api/admin/integrations/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://ms_ext_snow/api/admin/integrations/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-Org-Id $http_x_org_id;
            proxy_set_header X-Roles $http_x_roles;

            # CORS
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-User-Id, X-Org-Id, X-Roles' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Excel Report Generation API (P7)
        location /api/reports/excel/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://ms_gen_xls/api/reports/excel/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-Org-Id $http_x_org_id;
            proxy_set_header X-Roles $http_x_roles;

            # CORS
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-User-Id, X-Org-Id, X-Roles' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Smart Persistence Promotions API (routed to ms-admin)
        location /api/admin/promotions/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://ms_admin/api/admin/promotions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header X-Org-Id $http_x_org_id;
            proxy_set_header X-Roles $http_x_roles;

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-User-Id, X-Org-Id, X-Roles' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # =============================================================================
        # OTEL COLLECTOR PROXY (for browser telemetry)
        # =============================================================================

        location /otel/ {
            proxy_pass http://otel-collector:4318/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # CORS for browser OTEL SDK
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # DEFAULT API ROUTES (fallback)
        # =============================================================================

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            # Forward to orchestrator by default for workflow operations
            proxy_pass http://ms_orch/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # STATIC FILES (if needed)
        # =============================================================================

        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # =============================================================================
        # DEFAULT LOCATION
        # =============================================================================

        location / {
            return 404 '{"error": "Not Found", "message": "The requested resource was not found"}';
            add_header Content-Type application/json;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
