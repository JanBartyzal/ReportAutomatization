# Nginx API Gateway Configuration for ReportAutomatization P1
# Routes external requests to appropriate microservices

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    underscores_in_headers on;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # CORS WHITELIST MAP
    # =============================================================================
    
    map $http_origin $cors_origin {
        default "";
        "~^https://.*\\.company\\.cz$" $http_origin;
        "http://localhost:3000" $http_origin;
        "http://localhost:5173" $http_origin;
    }

    # Auth request set variable for status
    map $upstream_http_x_auth_status $auth_status {
        default $upstream_http_x_auth_status;
        "" "$upstream_status";
    }

    # =============================================================================
    # RATE LIMITING ZONES
    # =============================================================================

    # API rate limit: 100 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Auth rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=10r/s;

    # Upload rate limit: 10 requests per second, burst=20
    limit_req_zone $binary_remote_addr zone=upload_limit:1m rate=10r/s;

    # =============================================================================
    # UPSTREAM BACKENDS
    # =============================================================================

    # Upstreams — consolidated deployment units
    # See docker-compose.yml for container names and ports

    upstream ms_auth {
        server engine-core:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_ing {
        server engine-ingestor:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_orch {
        server engine-orchestrator:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # engine-data: query, dashboard, search, template, sinks
    upstream ms_qry {
        server engine-data:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_dash {
        server engine-data:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_srch {
        server engine-data:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # engine-reporting: lifecycle, period, form, pptx-template, notification
    upstream ms_lifecycle {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_period {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_notif {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_form {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_tmpl_pptx {
        server engine-reporting:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # engine-core: versioning, audit (same as auth)
    upstream ms_ver {
        server engine-core:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_audit {
        server engine-core:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # engine-integrations: servicenow
    upstream ms_ext_snow {
        server engine-integrations:8106 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ms_gen_xls {
        server processor-generators:8111 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =============================================================================
    # SERVER CONFIGURATION
    # =============================================================================

    server {
        listen 80;
        server_name localhost;

        # =============================================================================
        # SECURITY HEADERS
        # =============================================================================
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Readiness check
        location /ready {
            access_log off;
            return 200 "READY\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # INTERNAL AUTH VERIFY (used by auth_request subrequests)
        # =============================================================================
        location = /_internal/auth/verify {
            internal;
            proxy_pass http://ms_auth/api/auth/verify;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # =============================================================================
        # AUTH SERVICE ROUTES
        # =============================================================================

        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            # ForwardAuth - validate JWT token (uses internal location to avoid recursion)
            auth_request /_internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://ms_auth/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Forward auth context from verify response to backend services
            # These headers are set by engine-core's /api/auth/verify endpoint
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;
            proxy_set_header X-User-Role $auth_roles;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers (for preflight) - whitelist
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # UPLOAD SERVICE ROUTES
        # =============================================================================

        location /api/upload/ {
            limit_req zone=upload_limit burst=20 nodelay;

            # ForwardAuth - validate JWT token
            auth_request /_internal/auth/verify;
            auth_request_set $auth_status $upstream_status;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_org_id $upstream_http_x_org_id;
            auth_request_set $auth_roles $upstream_http_x_roles;

            proxy_pass http://ms_ing/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Forward auth context from verify response to backend services
            # These headers are set by engine-core's /api/auth/verify endpoint
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-Org-Id $auth_org_id;
            proxy_set_header X-Roles $auth_roles;
            proxy_set_header X-User-Role $auth_roles;
            
            # Increased timeouts for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Maximum upload size: 100MB
            client_max_body_size 100M;
            proxy_request_buffering off;

            # CORS headers - whitelist
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =============================================================================
        # ORCHESTRATOR - INTERNAL ONLY (NO EXTERNAL EXPOSURE)
        # =============================================================================
        # REMOVED: Orchestrator should not be exposed externally via API Gateway
        # Internal services communicate via Dapr gRPC, not REST through the gateway

