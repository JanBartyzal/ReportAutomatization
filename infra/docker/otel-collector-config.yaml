# OpenTelemetry Collector Configuration
# Opravená verze pro rok 2026

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  # OTLP receiver - přijímá data z vašich aplikací
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape vlastních metrik collectoru
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # Debug exportér pro výpis do konzole (vhodné pro logy)
  debug:
    verbosity: basic

  # Prometheus exportér (vytvoří endpoint pro scrape na portu 8889)
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true

service:
  pipelines:
    # Metriky posíláme do Promethea
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]

    # Logy posíláme POUZE do debug (Prometheus logy nepodporuje)
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

  extensions: [health_check, zpages]