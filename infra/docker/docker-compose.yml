# ReportAutomatization P1+P2 - Full Topology Docker Compose
# This file defines the complete infrastructure with all microservices
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d -f docker-compose.override.yml  # With debug ports
#   docker compose down               # Stop all services
#
# Services:
#   - nginx (ms-gw): API Gateway on port 80/443
#   - ms-auth: Authentication service
#   - ms-ing: File ingestion service
#   - ms-orch: Workflow orchestration
#   - ms-scan: Security scanner (ClamAV client)
#   - ms-sink-tbl: Table data sink
#   - ms-sink-doc: Document sink
#   - ms-sink-log: Log sink
#   - ms-atm-pptx: PPTX processor (Python)
#   - ms-atm-xls: Excel processor (Python)        [P2]
#   - ms-qry: Query API / CQRS read model (Java)  [P2]
#   - ms-dash: Dashboard aggregation (Java)        [P2]
#   - postgres: PostgreSQL 16 with pgVector
#   - redis: Redis for caching and state
#   - azurite: Azure Blob storage emulator
#   - clamav: Virus scanner
#   - dapr: Dapr sidecar services

services:
  # =============================================================================
  # API GATEWAY - Nginx
  # =============================================================================
  ms-gw:
    build:
      context: ../../apps/engine/microservices/units/ms-gw
      dockerfile: Dockerfile
    image: nginx:alpine
    container_name: ms-gw
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      ms-auth:
        condition: service_healthy
      ms-ing:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # JAVA MICROSERVICES
  # =============================================================================

  # MS-AUTH - Authentication Service
  ms-auth:
    build:
      context: ../../apps/engine/microservices/units/ms-auth
      dockerfile: Dockerfile
    container_name: ms-auth
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USERNAME=auth_user
      - DB_PASSWORD=${DB_PASSWORD:-auth_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - LOG_LEVEL=INFO
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
