# ReportAutomatization P8 - Consolidated Topology Docker Compose
# Consolidated from 29+ microservices into 8 deployment units
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose down               # Stop all services
#
# Consolidated Services:
#   - router (ms-gw):         Nginx API Gateway
#   - engine-core:            Auth + Admin + Batch + Versioning + Audit
#   - engine-ingestor:        File ingestion + virus scanning
#   - engine-orchestrator:    Workflow orchestration (State Machine + Saga)
#   - engine-data:            Sinks (tbl/doc/log) + Query + Dashboard + Search + Template
#   - engine-reporting:       Lifecycle + Period + Form + PPTX Template + Notification
#   - engine-integrations:    ServiceNow integration
#   - processor-atomizers:    PPTX/Excel/PDF/CSV parsing + AI + Cleanup
#   - processor-generators:   PPTX/Excel generation + MCP AI agent
#   - frontend:               React 18+ (Vite dev server)
#
# Infrastructure:
#   - postgres:  PostgreSQL 16 with pgVector
#   - redis:     Redis for caching, Dapr pubsub & state store
#   - azurite:   Azure Blob Storage emulator
#   - clamav:    ClamAV virus scanner
#   - litellm:   LiteLLM AI Gateway (OpenAI-compatible)
#   - mailhog:   SMTP test server
#   - dapr:      Dapr sidecar (placement service)

services:
  # =============================================================================
  # API GATEWAY - Nginx
  # =============================================================================
  router:
    build:
      context: ../../apps/router
      dockerfile: Dockerfile
    container_name: router
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../apps/router/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      engine-core:
        condition: service_healthy
      engine-ingestor:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # CONSOLIDATED JAVA SERVICES
  # =============================================================================

  # ENGINE-CORE: Auth + Admin + Batch + Versioning + Audit
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-core:
    build:
      context: ../../
      dockerfile: apps/engine/engine-core/Dockerfile
    container_name: engine-core
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_core_db
      - DB_USERNAME=engine_core_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_core_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_KEYVAULT_URI=${AZURE_KEYVAULT_URI:-}
      - JWT_ISSUER=${JWT_ISSUER:-https://login.microsoftonline.com/common/v2.0}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-https://login.microsoftonline.com/common/discovery/v2.0/keys}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTH_MODE=${AUTH_MODE:-development}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-INGESTOR: File ingestion + virus scanning (includes scanner sub-module)
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-ingestor:
    build:
      context: ../../
      dockerfile: apps/engine/engine-ingestor/Dockerfile
    container_name: engine-ingestor
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_ingestor_db
      - DB_USERNAME=engine_ingestor_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_ingestor_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
      clamav:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-ORCHESTRATOR: Workflow orchestration (State Machine + Saga)
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-orchestrator:
    build:
      context: ../../
      dockerfile: apps/engine/engine-orchestration/Dockerfile
    container_name: engine-orchestrator
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_orchestrator_db
      - DB_USERNAME=engine_orchestrator_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_orchestrator_pass}
      - GRPC_PORT=50051
      - HTTP_PORT=8080
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8083:8080"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ENGINE-DATA: Sinks (tbl/doc/log) + Query + Dashboard + Search + Template
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-data:
    build:
      context: ../../
      dockerfile: apps/engine/engine-data/Dockerfile
    container_name: engine-data
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_data_db
      - DB_USERNAME=engine_data_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_data_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - MAPPING_AI_ENABLED=true
      - MAPPING_AI_DAPR_APP_ID=processor-atomizers
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8100:8100"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8100/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-REPORTING: Lifecycle + Period + Form + PPTX Template + Notification
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-reporting:
    build:
      context: ../../
      dockerfile: apps/engine/engine-reporting/Dockerfile
    container_name: engine-reporting
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_reporting_db
      - DB_USERNAME=engine_reporting_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_reporting_pass}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=templates
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8105:8105"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8105/actuator/health/liveness" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ENGINE-INTEGRATIONS: ServiceNow OAuth2 integration
  # Build context = project root (Dockerfile uses packages/ and apps/ paths)
  engine-integrations:
    build:
      context: ../../
      dockerfile: apps/engine/engine-integrations/Dockerfile
    container_name: engine-integrations
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=engine_integrations_db
      - DB_USERNAME=engine_integrations_user
      - DB_PASSWORD=${DB_PASSWORD:-engine_integrations_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - AZURE_KEYVAULT_URI=${AZURE_KEYVAULT_URI:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - JWT_ISSUER=${JWT_ISSUER:-https://login.microsoftonline.com/common/v2.0}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-https://login.microsoftonline.com/common/discovery/v2.0/keys}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8106:8106"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8106/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================================================
  # CONSOLIDATED PYTHON SERVICES
  # =============================================================================

  # PROCESSOR-ATOMIZERS: PPTX/Excel/PDF/CSV parsing + AI gateway + Cleanup worker
  # Build context = repo root (needs packages/python-base)
  processor-atomizers:
    build:
      context: ../..
      dockerfile: apps/processor/processor-atomizers/Dockerfile
    container_name: processor-atomizers
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=processor-atomizers
      - HTTP_PORT=8088
      - GRPC_PORT=50090
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - TEMP_CONTAINER=temp
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY:-sk-local-dev-key}
      - DEFAULT_MONTHLY_TOKEN_QUOTA=1000000
      - MAX_CONCURRENT_PER_ORG=5
      - CLEANUP_INTERVAL_HOURS=6
      - CLEANUP_DRY_RUN=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8088:8088"
      - "50090:50090"
    volumes:
      - tesseract_data:/usr/share/tesseract-ocr/5/tessdata
      - ../../tests/UAT/data:/app/data:ro
    depends_on:
      azurite:
        condition: service_healthy
      litellm:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PROCESSOR-GENERATORS: PPTX/Excel report generation + MCP AI agent
  # Build context = repo root (needs packages/python-base)
  processor-generators:
    build:
      context: ../..
      dockerfile: apps/processor/processor-generators/Dockerfile
    container_name: processor-generators
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=processor-generators
      - HTTP_PORT=8111
      - GRPC_PORT=50091
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - TEMPLATES_CONTAINER=templates
      - GENERATED_CONTAINER=generated-reports
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reportplatform
      - DB_USER=ms_qry
      - DB_PASSWORD=${DB_PASSWORD:-ms_qry_pass}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - MPLBACKEND=Agg
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8111:8111"
      - "50091:50091"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8111/health')" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================================================
  # FRONTEND
  # =============================================================================

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
      - ../../packages/types:/packages/types
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://router:80
      - VITE_AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - VITE_AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - VITE_AZURE_REDIRECT_URI=http://localhost:5173
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      router:
        condition: service_started
    networks:
      - report-net

  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  # PostgreSQL 16 with pgVector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=reportplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d reportplatform" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - report-net

  # Redis for caching, Dapr pubsub & state store
  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - report-net

  # Azurite - Azure Blob Storage Emulator
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --silent --skipApiVersionCheck
    volumes:
      - azurite_data:/data
    ports:
      - "10000:10000"
    healthcheck:
      test: [ "CMD", "nc", "-z", "127.0.0.1", "10000" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  # ClamAV - Virus Scanner
  clamav:
    image: clamav/clamav:latest
    container_name: clamav
    environment:
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMAV_NO_MILTERD=true
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: [ "CMD", "clamdscan", "--ping", "1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - report-net

  # LiteLLM - AI Gateway Proxy (OpenAI-compatible)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    command: --config /app/config.yaml --port 4000
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-https://placeholder.openai.azure.com}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-sk-placeholder}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev-key}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  # MailHog - SMTP Test Server
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI
    environment:
      - MH_MAILDIR_PATH=/mail
    volumes:
      - mailhog_data:/mail
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8025" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dapr Sidecar (Placement service)
  dapr:
    image: daprio/dapr:1.14.0
    container_name: dapr
    command: "./placement --port 50006 --listen-address 0.0.0.0"
    ports:
      - "50006:50006"
      - "3500:3500"
      - "50001:50001"
    volumes:
      - ./dapr/components:/components:ro
    networks:
      - report-net
    healthcheck:
      disable: true

  # =============================================================================
  # OBSERVABILITY
  # =============================================================================

  # OpenTelemetry Collector - receives telemetry data from all services
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Prometheus exporter metrics
      - "8889:8889" # Prometheus scrape endpoint
      - "13133:13133" # health_check extension
    networks:
      - report-net
    healthcheck:
      disable: true

  # Grafana - Metrics visualization and dashboards
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - otel-collector
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - report-net
    container_name: prometheus
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  report-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  azurite_data:
  clamav_data:
  tesseract_data:
  mailhog_data:
  grafana_data:
