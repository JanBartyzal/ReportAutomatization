  # PYTHON MICROSERVICES
  # =============================================================================

  # MS-ATM-PPTX - PPTX Processing Service
  ms-atm-pptx:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-pptx
      dockerfile: Dockerfile
    container_name: ms-atm-pptx
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LOG_LEVEL=INFO
    ports:
      - "8088:8000"
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS-ATM-XLS - Excel Processing Service
  ms-atm-xls:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-xls
      dockerfile: Dockerfile
    container_name: ms-atm-xls
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LOG_LEVEL=INFO
    ports:
      - "8089:8000"
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS-ATM-PDF - PDF/OCR Processing Service
  ms-atm-pdf:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-pdf
      dockerfile: Dockerfile
    container_name: ms-atm-pdf
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - TEMP_CONTAINER=temp
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LOG_LEVEL=INFO
    ports:
      - "8090:50051"
    volumes:
      - tesseract_data:/usr/share/tesseract-ocr/5/tessdata
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net

  # MS-ATM-CSV - CSV Processing Service
  ms-atm-csv:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-csv
      dockerfile: Dockerfile
    container_name: ms-atm-csv
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - AZURE_STORAGE_CONTAINER=file-uploads
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LOG_LEVEL=INFO
    ports:
      - "8093:50051"
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net

  # MS-ATM-AI - AI Gateway (LiteLLM integration)
  ms-atm-ai:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-ai
      dockerfile: Dockerfile
    container_name: ms-atm-ai
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=ms-atm-ai
      - GRPC_PORT=50051
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY:-sk-local-dev-key}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - DEFAULT_MONTHLY_TOKEN_QUOTA=1000000
      - MAX_CONCURRENT_PER_ORG=5
      - LOG_LEVEL=INFO
    ports:
      - "8095:50051"
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS-ATM-CLN - Cleanup Worker (CronJob)
  ms-atm-cln:
    build:
      context: ../../apps/processor/microservices/units/ms-atm-cln
      dockerfile: Dockerfile
    container_name: ms-atm-cln
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - TEMP_CONTAINER=temp
      - FILES_CONTAINER=files
      - GENERATOR_CONTAINER=generator-output
      - CRON_SCHEDULE="0 * * * *"
      - DRY_RUN=false
      - LOG_LEVEL=INFO
    networks:
      - report-net

  # MS-MCP - MCP Server (AI Agent Interface)
  ms-mcp:
    build:
      context: ../../apps/processor/microservices/units/ms-mcp
      dockerfile: Dockerfile
    container_name: ms-mcp
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=ms-mcp
      - HTTP_PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reportplatform
      - DB_USER=ms_qry
      - DB_PASSWORD=ms_qry_pass
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - LOG_LEVEL=INFO
    ports:
      - "8096:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS-GEN-PPTX - PPTX Report Generator (P4b)
  ms-gen-pptx:
    build:
      context: ../../apps/processor/microservices/units/ms-gen-pptx
      dockerfile: Dockerfile
    container_name: ms-gen-pptx
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=ms-gen-pptx
      - GRPC_PORT=50051
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - TEMPLATES_CONTAINER=templates
      - GENERATED_CONTAINER=generated-reports
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - MPLBACKEND=Agg
      - LOG_LEVEL=INFO
    ports:
      - "8105:50051"
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3)" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # MS-EXT-SNOW - ServiceNow Integration Service (P7)
  ms-ext-snow:
    build:
      context: ../../
      dockerfile: apps/engine/microservices/units/ms-ext-snow/Dockerfile
    container_name: ms-ext-snow
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reportplatform
      - DB_USERNAME=snow_user
      - DB_PASSWORD=${DB_PASSWORD:-snow_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_pass}
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - AZURE_KEYVAULT_URI=${AZURE_KEYVAULT_URI:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - JWT_ISSUER=${JWT_ISSUER:-https://login.microsoftonline.com/common/v2.0}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-https://login.microsoftonline.com/common/discovery/v2.0/keys}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8107:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # MS-GEN-XLS - Excel Report Generator (P7)
  ms-gen-xls:
    build:
      context: ../../
      dockerfile: apps/processor/microservices/units/ms-gen-xls/Dockerfile
    container_name: ms-gen-xls
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_NAME=ms-gen-xls
      - GRPC_PORT=50051
      - HTTP_PORT=8000
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1}
      - TEMPLATES_CONTAINER=templates
      - GENERATED_CONTAINER=generated-reports
      - DAPR_HOST=dapr
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
      - DAPR_PUBSUB_NAME=reportplatform-pubsub
      - DAPR_STATESTORE_NAME=reportplatform-statestore
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8108:50051"
      - "8109:8000"
    depends_on:
      azurite:
        condition: service_healthy
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================================================
  # FRONTEND
  # =============================================================================

  ms-fe:
    image: node:20-alpine
    container_name: ms-fe
    working_dir: /app
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost
      - VITE_AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - VITE_AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - VITE_AZURE_REDIRECT_URI=http://localhost
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      ms-gw:
        condition: service_started
    networks:
      - report-net

  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  # PostgreSQL 16 with pgVector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=reportplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d reportplatform" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - report-net

  # Redis for caching and state
  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - report-net

  # Azurite - Azure Blob Storage Emulator
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --silent
    volumes:
      - azurite_data:/data
    ports:
      - "10000:10000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  # ClamAV - Virus Scanner
  clamav:
    image: clamav/clamav:latest
    container_name: clamav
    environment:
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_FRESHCLAMD=true
      - CLAMAV_NO_MILTERD=true
    volumes:
      - clamav_data:/var/lib/clamav
      - ./clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    ports:
      - "3310:3310"
    command: clamd --config-file=/etc/clamav/clamd.conf --Foreground=true
    healthcheck:
      test: [ "CMD", "clamdscan", "--ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - report-net

  # LiteLLM - AI Gateway Proxy (OpenAI-compatible)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    command: --config /app/config.yaml --port 4000
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-https://placeholder.openai.azure.com}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-sk-placeholder}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev-key}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-net

  # MailHog - SMTP Test Server
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI
    environment:
      - MH_MAILDIR_PATH=/mail
    volumes:
      - mailhog_data:/mail
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8025" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dapr Sidecar (Placements service)
  dapr:
    image: daprio/dapr:1.14.0
    container_name: dapr
    command: "./placement -port 50006 -0.0.0.0"
    ports:
      - "50006:50006"
      - "3500:3500"
      - "50001:50001"
      - "8080:8080"
    volumes:
      - ./dapr/components:/components:ro
    networks:
      - report-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3500/v1.0/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # LibreOffice - Headless for PPTX validation (P4b)
  libreoffice:
    image: libreoffice/stable:7.6.4
    container_name: libreoffice
    command: --headless --invisible --norestore --convert-to pdf --outdir /tmp
    networks:
      - report-net
    # Note: LibreOffice doesn't need a healthcheck as it's used on-demand
    # It's called from MS-GEN-PPTX for validation purposes

    # =============================================================================
    # GENERATED REPORTS STORAGE (P4b)
    # =============================================================================

    # Blob container for generated PPTX reports
    # Note: Uses azurite (already defined above) with container 'generated-reports'

networks:
  report-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  azurite_data:
  clamav_data:
  tesseract_data:
  mailhog_data:
