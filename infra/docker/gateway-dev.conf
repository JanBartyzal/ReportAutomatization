# ================================================================
# Clouply Gateway – DEV mode (Vite dev servers + HMR WebSocket)
# ================================================================
# Používá resolver 127.0.0.11 (Docker DNS) a proměnné v proxy_pass,
# aby nginx nestartoval s chybou pokud některá služba neběží.

resolver 127.0.0.11 valid=10s;

# --- CIM Frontend App (Vite dev server) ---
server {
    listen 80;
    server_name app.clouply.local;

    location / {
        set $upstream_frontend frontend:4200;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Pulse Backend API (K8s unit-api-gateway) ---
server {
    listen 80;
    server_name api.clouply.local;

    location / {
        set $upstream_api host.docker.internal:8080;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Suite Landing (clouply.local) ---
