# Prometheus Alerting Rules for ReportPlatform
# Covers: service health, error rates, DLQ, DB pool, upload latency

groups:
  - name: reportplatform_service_health
    rules:
      # Service down for more than 1 minute
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.job }}/{{ $labels.instance }} has been unreachable for more than 1 minute."

  - name: reportplatform_error_rates
    rules:
      # HTTP 5xx error rate exceeds 5% over 5 minutes
      - alert: HighErrorRate
        expr: >
          (
            sum by (instance) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum by (instance) (rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "HTTP 5xx error rate on {{ $labels.instance }} is above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      # gRPC error rate for Python services
      - alert: HighGrpcErrorRate
        expr: >
          (
            sum by (service) (rate(reportplatform_grpc_requests_total{status="error"}[5m]))
            /
            sum by (service) (rate(reportplatform_grpc_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High gRPC error rate on {{ $labels.service }}"
          description: "gRPC error rate on {{ $labels.service }} exceeds 5% (current: {{ $value | humanizePercentage }})."

  - name: reportplatform_orchestrator
    rules:
      # DLQ (Dead Letter Queue) depth exceeds threshold
      - alert: DLQDepthHigh
        expr: reportplatform_orchestrator_dlq_depth > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DLQ depth is high ({{ $value }})"
          description: "Orchestrator DLQ depth has exceeded 10 messages for more than 2 minutes. Investigate failed workflow steps."

      # Workflow queue depth growing
      - alert: WorkflowQueueBacklog
        expr: reportplatform_orchestrator_queue_depth > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow queue backlog growing ({{ $value }})"
          description: "Orchestrator workflow queue depth has exceeded 50 for more than 5 minutes."

  - name: reportplatform_database
    rules:
      # HikariCP connection pool utilization above 80%
      - alert: DBConnectionPoolHigh
        expr: >
          (
            hikaricp_connections_active
            /
            hikaricp_connections_max
          ) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB connection pool above 80% on {{ $labels.instance }}"
          description: "HikariCP connection pool on {{ $labels.instance }} (pool: {{ $labels.pool }}) is {{ $value | humanizePercentage }} utilized for the last 5 minutes."

      # Connection pool exhaustion imminent
      - alert: DBConnectionPoolCritical
        expr: >
          (
            hikaricp_connections_active
            /
            hikaricp_connections_max
          ) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool near exhaustion on {{ $labels.instance }}"
          description: "HikariCP connection pool on {{ $labels.instance }} is at {{ $value | humanizePercentage }}. Connection exhaustion imminent."

  - name: reportplatform_upload
    rules:
      # Upload latency p95 exceeds 10 seconds
      - alert: UploadLatencyHigh
        expr: >
          histogram_quantile(0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{uri=~"/api/upload.*"}[5m]))
          ) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Upload latency p95 exceeds 10s"
          description: "The 95th percentile upload latency has exceeded 10 seconds for the last 5 minutes (current: {{ $value | humanize }}s)."

  - name: reportplatform_atomizer
    rules:
      # File processing taking too long
      - alert: AtomizerProcessingSlow
        expr: >
          histogram_quantile(0.95,
            sum by (le, service) (rate(reportplatform_file_processing_duration_seconds_bucket[5m]))
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Atomizer {{ $labels.service }} processing is slow"
          description: "p95 file processing time for {{ $labels.service }} exceeds 60s (current: {{ $value | humanize }}s)."

      # High file processing failure rate
      - alert: AtomizerHighFailureRate
        expr: >
          (
            sum by (service) (rate(reportplatform_file_processing_total{status="failure"}[5m]))
            /
            sum by (service) (rate(reportplatform_file_processing_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High failure rate in {{ $labels.service }}"
          description: "File processing failure rate in {{ $labels.service }} exceeds 10% (current: {{ $value | humanizePercentage }})."
