# ClamAV Freshclam Configuration
# This file configures automatic virus signature database updates
# 
# Note: In production, you would use a proxy or mirror in a restricted network
# For local development, we use the defaultclamav-mirror

# Database mirror
DatabaseMirror db.local.clamav.net
DatabaseMirror database.clamav.net

# Local database directory
DatabaseDirectory /var/lib/clamav

# Update log file
UpdateLogFile /var/log/clamav/freshclam.log

# Log verbose output
LogVerbose false

# Log time
LogTime true

# Use DNS
DNSDatabaseInfo current.cvd.clamav.net

# Number of database checks per day (2 = twice daily)
Checks 2

# Notify clamd to reload after update
NotifyClamd /etc/clamav/clamd.conf

# Run as a daemon
Foreground false

# Pid file
PidFile /var/run/clamav/freshclam.pid

# Database owner
DatabaseOwner clamav

# Allow database from private mirrors (for development)
AllowSupplementaryMatches true

# Max log file size (10MB)
MaxLogFileSize 10M

# Don't retry failed downloads immediately
RetryOnError true

# Timeout for downloads (5 minutes)
Timeout 300

