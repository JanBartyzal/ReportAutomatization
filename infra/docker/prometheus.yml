# Prometheus Configuration - Metrics Collection
# Scrapes OTEL Collector metrics + Spring Boot Actuator + Python services + Dapr metrics
#
# Aligned with consolidated docker-compose.yml topology (P8):
#   engine-core, engine-ingestor, engine-orchestrator, engine-data,
#   engine-reporting, engine-integrations, processor-atomizers, processor-generators

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  # OTEL Collector exported metrics (all services aggregated)
  - job_name: otel-collector
    scrape_interval: 10s
    static_configs:
      - targets: ["otel-collector:8889"]

  # OTEL Collector internal metrics
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  # Consolidated Java services - Spring Boot Actuator Prometheus endpoint
  # Ports match docker-compose.yml internal ports
  - job_name: java-services
    scrape_interval: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "engine-core:8081"          # Auth + Admin + Batch + Versioning + Audit
          - "engine-ingestor:8082"      # File ingestion + virus scanning
          - "engine-orchestrator:8080"  # Workflow orchestration (State Machine + Saga)
          - "engine-data:8100"          # Sinks (tbl/doc/log) + Query + Dashboard + Search + Template
          - "engine-reporting:8105"     # Lifecycle + Period + Form + PPTX Template + Notification
          - "engine-integrations:8106"  # ServiceNow integration

  # Consolidated Python services - prometheus_client HTTP endpoint
  - job_name: python-services
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "processor-atomizers:8088"    # PPTX/Excel/PDF/CSV parsing + AI + Cleanup
          - "processor-generators:8111"   # PPTX/Excel generation + MCP AI agent

  # Dapr placement service metrics
  - job_name: dapr
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["dapr:9090"]

  # Redis metrics (if redis-exporter is present)
  - job_name: redis
    scrape_interval: 30s
    static_configs:
      - targets: ["redis-exporter:9121"]
