[build-system]
requires = ["setuptools>=68.0", "wheel>=0.41.0"]
build-backend = "setuptools.build_meta"

[project]
name = "python-base"
version = "0.1.0"
description = "Shared Python base libraries for ReportAutomatization microservices"
requires-python = ">=3.12"
dependencies = [
    # Web framework
    "fastapi>=0.110.0,<1.0.0",
    "uvicorn[standard]>=0.27.0,<1.0.0",
    "pydantic>=2.6.0,<3.0.0",
    "pydantic-settings>=2.1.0,<3.0.0",

    # gRPC
    "grpcio>=1.62.0,<2.0.0",
    "grpcio-tools>=1.62.0,<2.0.0",
    "grpcio-health-checking>=1.62.0,<2.0.0",

    # Dapr SDK
    "dapr>=1.13.0,<2.0.0",
    "dapr-ext-grpc>=1.13.0,<2.0.0",

    # OpenTelemetry
    "opentelemetry-api>=1.23.0,<2.0.0",
    "opentelemetry-sdk>=1.23.0,<2.0.0",
    "opentelemetry-instrumentation-fastapi>=0.44b0",
    "opentelemetry-exporter-otlp>=1.23.0,<2.0.0",
    "opentelemetry-instrumentation-grpc>=0.44b0",

    # Async HTTP client
    "httpx>=0.27.0,<1.0.0",

    # Metrics
    "prometheus-client>=0.20.0,<1.0.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0,<9.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",
    "pytest-mock>=3.12.0,<4.0.0",
    "pytest-cov>=4.1.0,<5.0.0",
]

[tool.setuptools.packages.find]
include = ["python_base*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "ANN", "B", "SIM"]
ignore = ["ANN101", "ANN102"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
