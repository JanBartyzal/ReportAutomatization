syntax = "proto3";
package generator.v1;

import "common/v1/common.proto";
import "generator/v1/generator.proto";

option java_package = "com.reportplatform.proto.generator.v1";
option java_multiple_files = true;

// Service for aggregating report data for PPTX generation
service ReportDataService {
  rpc GetReportData(GetReportDataRequest) returns (GetReportDataResponse);
  rpc GetBatchReportData(GetBatchReportDataRequest) returns (GetBatchReportDataResponse);
}

message GetReportDataRequest {
  string report_id = 1;
  common.v1.RequestContext context = 2;
  string template_id = 3;
}

message GetReportDataResponse {
  string report_id = 1;
  map<string, string> text_placeholders = 2;
  repeated GeneratorTableData tables = 3;
  repeated GeneratorChartData charts = 4;
  repeated string available_fields = 5;
  int64 cached_at = 6;
}

message GetBatchReportDataRequest {
  repeated string report_ids = 1;
  common.v1.RequestContext context = 2;
  string template_id = 3;
}

message GetBatchReportDataResponse {
  repeated GetReportDataResponse results = 1;
  int32 successful = 2;
  int32 failed = 3;
}
