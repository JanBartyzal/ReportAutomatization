syntax = "proto3";
package atomizer.v1;

import "common/v1/common.proto";
import "atomizer/v1/excel.proto";

option java_package = "com.reportplatform.proto.atomizer.v1";
option java_multiple_files = true;

// ServiceNow Export Atomizer
// Parses structured exports from ServiceNow (CSV Table API, JSON bulk export,
// Excel report export) into the same SheetContentResponse schema used by the
// Excel atomizer, enabling the existing sink pipeline to be reused without
// changes.
service ServiceNowAtomizerService {
  // Detect the export format and return table-level structure.
  rpc ExtractStructure(ServiceNowExtractRequest) returns (ServiceNowStructureResponse);

  // Extract a single table/sheet into normalised rows + headers.
  rpc ExtractTableContent(ServiceNowTableRequest) returns (SheetContentResponse);

  // Convenience: extract all tables in one call (partial-success supported).
  rpc ExtractAll(ServiceNowExtractRequest) returns (ServiceNowFullExtractionResponse);
}

// --- Shared request types ---

message ServiceNowExtractRequest {
  common.v1.RequestContext context = 1;
  string file_id = 2;
  string blob_url = 3;
  // Hint about the export format; if omitted the atomizer auto-detects.
  ServiceNowExportFormat format = 4;
  // Optional: ServiceNow table name for audit / metadata enrichment.
  string snow_table_name = 5;
}

message ServiceNowTableRequest {
  common.v1.RequestContext context = 1;
  string file_id = 2;
  string blob_url = 3;
  int32 table_index = 4;
  ServiceNowExportFormat format = 5;
  string snow_table_name = 6;
}

// --- Export format enum ---

enum ServiceNowExportFormat {
  SERVICE_NOW_FORMAT_UNSPECIFIED = 0;
  // CSV export from the ServiceNow Table API (/api/now/table/<table>.csv)
  SERVICE_NOW_FORMAT_CSV = 1;
  // JSON export (/api/now/table/<table> with Accept: application/json)
  SERVICE_NOW_FORMAT_JSON = 2;
  // Excel report export (.xlsx generated by ServiceNow)
  SERVICE_NOW_FORMAT_EXCEL = 3;
}

// --- Responses ---

message ServiceNowStructureResponse {
  string file_id = 1;
  ServiceNowExportFormat detected_format = 2;
  repeated ServiceNowTableMetadata tables = 3;
}

message ServiceNowTableMetadata {
  int32 table_index = 1;
  string name = 2;           // Derived from file name or "data" for single-table exports
  int32 row_count = 3;
  int32 col_count = 4;
  string snow_table_name = 5; // sys_table_name if available in export metadata
}

message ServiceNowFullExtractionResponse {
  string file_id = 1;
  common.v1.ProcessingStatus status = 2;
  ServiceNowExportFormat detected_format = 3;
  repeated SheetContentResponse successful_tables = 4;
  repeated ServiceNowExtractionError failed_tables = 5;
}

message ServiceNowExtractionError {
  int32 table_index = 1;
  string table_name = 2;
  string error_code = 3;
  string error_message = 4;
}
