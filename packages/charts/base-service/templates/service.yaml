apiVersion: v1
kind: Service
metadata:
  name: {{ include "base-service.fullname" . }}
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort | default 8080 }}
      targetPort: {{ .Values.service.httpPort | default 8080 }}
      protocol: TCP
      name: http
    {{- if .Values.service.grpcPort }}
    - port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort | default 5000 }}
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "base-service.selectorLabels" . | nindent 4 }}
