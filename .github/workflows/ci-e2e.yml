name: CI - E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start infrastructure
        working-directory: infra/docker
        run: |
          cp .env.example .env
          docker compose up -d postgres redis azurite clamav dapr litellm
          docker compose up -d --wait

      - name: Start core services
        working-directory: infra/docker
        run: |
          docker compose up -d ms-auth ms-ing ms-orch ms-scan ms-gw ms-fe
          sleep 30

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "Gateway is healthy"
              break
            fi
            echo "Waiting for gateway... ($i/60)"
            sleep 5
          done

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: tests/e2e
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Teardown
        if: always()
        working-directory: infra/docker
        run: docker compose down -v

  api-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start infrastructure
        working-directory: infra/docker
        run: |
          cp .env.example .env
          docker compose up -d postgres redis azurite clamav dapr litellm
          docker compose up -d --wait

      - name: Start core services
        working-directory: infra/docker
        run: |
          docker compose up -d ms-auth ms-ing ms-orch ms-scan ms-gw
          sleep 30

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "Auth service healthy"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done

      - name: Install dependencies
        working-directory: tests/integration
        run: npm ci

      - name: Run API integration tests
        working-directory: tests/integration
        run: npx vitest run
        env:
          BASE_URL: http://localhost
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: reportplatform

      - name: Teardown
        if: always()
        working-directory: infra/docker
        run: docker compose down -v

  performance-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Start infrastructure
        working-directory: infra/docker
        run: |
          cp .env.example .env
          docker compose up -d postgres redis azurite clamav dapr litellm
          docker compose up -d --wait

      - name: Start core services
        working-directory: infra/docker
        run: |
          docker compose up -d ms-auth ms-ing ms-orch ms-qry ms-dash ms-gw
          sleep 30

      - name: Run smoke performance test
        working-directory: tests/performance
        run: k6 run --vus 1 --duration 10s scripts/query-latency.js
        env:
          BASE_URL: http://localhost

      - name: Teardown
        if: always()
        working-directory: infra/docker
        run: docker compose down -v
