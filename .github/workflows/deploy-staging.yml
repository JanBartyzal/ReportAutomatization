name: Deploy - Staging

on:
  workflow_run:
    workflows: ["CI - Java Services", "CI - Python Services", "CI - Frontend"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-reportplatform-staging
  ACA_ENVIRONMENT: reportplatform-staging

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/terraform/main.bicep \
            --parameters \
              environment=staging \
              imageTag=${{ github.event.workflow_run.head_sha }} \
            --mode Incremental

      - name: Deploy changed services
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          ACR=${{ secrets.ACR_LOGIN_SERVER }}

          # Get list of container apps in the environment
          APPS=$(az containerapp list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[].name" -o tsv)

          for APP in $APPS; do
            # Check if an image with the new tag exists in ACR
            IMAGE_EXISTS=$(az acr repository show-tags \
              --name ${ACR%%.*} \
              --repository "$APP" \
              --query "[?@ == '$IMAGE_TAG']" -o tsv 2>/dev/null || echo "")

            if [ -n "$IMAGE_EXISTS" ]; then
              echo "Updating $APP to image tag $IMAGE_TAG..."
              az containerapp update \
                --name "$APP" \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --image "$ACR/$APP:$IMAGE_TAG"
            fi
          done

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show \
            --name ms-gw \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")

          if [ -n "$FQDN" ]; then
            echo "Running smoke test against https://$FQDN..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health" || echo "000")
            echo "Health check status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "::warning::Smoke test returned status $HTTP_STATUS"
            fi
          else
            echo "::notice::No gateway FQDN found, skipping smoke test"
          fi
